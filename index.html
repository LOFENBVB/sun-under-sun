:["独立","毅力"],"originalLang":"zh"},{"content":"世界上没有无缘无故的爱，也没有无缘无故的恨。","original":"世界上没有无缘无故的爱，也没有无缘无故的恨。","tags":["因果","阶级"],"originalLang":"zh"},{"content":"战略上要藐视敌人，战术上要重视敌人。","original":"战略上要藐视敌人，战术上要重视敌人。","tags":["战略","勇气"],"originalLang":"zh"}]},"aurelius":{"name":"马可·奥勒留","nameEn":"Marcus Aurelius","school":"斯多葛","era":"121-180","originalLang":"la","core":"内心自由、顺应自然、死亡冥想、理性支配","style":"内省沉稳。一个罗马皇帝写给自己的日记——如何在不完美的世界中保持内心的完整。","quotes":[{"content":"Each day provides its own gifts.","original":"Each day provides its own gifts.","originalLang":"en","tags":["Famous Quotes","Wisdom"]},{"content":"Everything that exists is in a manner the seed of that which will be.","original":"Everything that exists is in a manner the seed of that which will be.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Waste no more time arguing about what a good man should be. Be one.","original":"Waste no more time arguing about what a good man should be. Be one.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Very little is needed to make a happy life; it is all within yourself, in your way of thinking.","original":"Very little is needed to make a happy life; it is all within yourself, in your way of thinking.","originalLang":"en","tags":["Famous Quotes"]},{"content":"He who lives in harmony with himself lives in harmony with the universe.","original":"He who lives in harmony with himself lives in harmony with the universe.","originalLang":"en","tags":["Famous Quotes","Wisdom"]},{"content":"The universe is transformation; our life is what our thoughts make it.","original":"The universe is transformation; our life is what our thoughts make it.","originalLang":"en","tags":["Famous Quotes"]},{"content":"If it is not right do not do it; if it is not true do not say it.","original":"If it is not right do not do it; if it is not true do not say it.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Look back over the past, with its changing empires that rose and fell, and you can foresee the future, too.","original":"Look back over the past, with its changing empires that rose and fell, and you can foresee the future, too.","originalLang":"en","tags":["Future"]},{"content":"Accept the things to which fate binds you and love the people with whom fate brings you together but do so with all your heart.","original":"Accept the things to which fate binds you and love the people with whom fate brings you together but do so with all your heart.","originalLang":"en","tags":["Famous Quotes"]},{"content":"There is nothing happens to any person but what was in his power to go through with.","original":"There is nothing happens to any person but what was in his power to go through with.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Everything that happens as it should, and if you observe carefully, you will find this to be so.","original":"Everything that happens as it should, and if you observe carefully, you will find this to be so.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Everything we hear is an opinion, not a fact. Everything we see is a perspective, not the truth.","original":"Everything we hear is an opinion, not a fact. Everything we see is a perspective, not the truth.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Loss is nothing else but change, and change is Nature's delight.","original":"Loss is nothing else but change, and change is Nature's delight.","originalLang":"en","tags":["Famous Quotes","Change","Wisdom"]}]},"seneca":{"name":"塞涅卡","nameEn":"Seneca the Younger","school":"斯多葛","era":"4 BC-65 AD","originalLang":"la","core":"命运接受、时间意识、心灵平静、简朴生活","style":"睿智实用。哲学不是抽象思辨，而是生活的技艺。","quotes":[{"content":"Things that were hard to bear are sweet to remember.","original":"Things that were hard to bear are sweet to remember.","originalLang":"en","tags":["Famous Quotes"]},{"content":"The greatest remedy for anger is delay.","original":"The greatest remedy for anger is delay.","originalLang":"en","tags":["Famous Quotes"]},{"content":"There is no great genius without some touch of madness.","original":"There is no great genius without some touch of madness.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Friendship always benefits; love sometimes injures.","original":"Friendship always benefits; love sometimes injures.","originalLang":"en","tags":["Friendship"]},{"content":"If one does not know to which port is sailing, no wind is favorable.","original":"If one does not know to which port is sailing, no wind is favorable.","originalLang":"en","tags":["Famous Quotes"]},{"content":"No man was ever wise by chance.","original":"No man was ever wise by chance.","originalLang":"en","tags":["Famous Quotes","Wisdom"]},{"content":"Most powerful is he who has himself in his own power.","original":"Most powerful is he who has himself in his own power.","originalLang":"en","tags":["Famous Quotes"]},{"content":"The mind unlearns with difficulty what it has long learned.","original":"The mind unlearns with difficulty what it has long learned.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Begin at once to live and count each separate day as a separate life.","original":"Begin at once to live and count each separate day as a separate life.","originalLang":"en","tags":["Famous Quotes"]},{"content":"The conditions of conquest are always easy. We have but to toil awhile, endure awhile, believe always, and never turn back.","original":"The conditions of conquest are always easy. We have but to toil awhile, endure awhile, believe always, and never turn back.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Luck is what happens when preparation meets opportunity.","original":"Luck is what happens when preparation meets opportunity.","originalLang":"en","tags":["Famous Quotes"]},{"content":"One of the most beautiful qualities of true friendship is to understand and to be understood.","original":"One of the most beautiful qualities of true friendship is to understand and to be understood.","originalLang":"en","tags":["Friendship"]},{"content":"If one does not know to which port one is sailing, no wind is favorable.","original":"If one does not know to which port one is sailing, no wind is favorable.","originalLang":"en","tags":["Wisdom"]}]},"epictetus":{"name":"爱比克泰德","nameEn":"Epictetus","school":"斯多葛","era":"55-135","originalLang":"la","core":"控制的二分法、自由即理性、习惯的力量","style":"直指人心。一个曾经的奴隶教你什么才是真正的自由。","quotes":[{"content":"If you wish to be a writer, write.","original":"If you wish to be a writer, write.","originalLang":"en","tags":["Success"]},{"content":"Not every difficult and dangerous thing is suitable for training, but only that which is conducive to success in achieving the object of our effort.","original":"Not every difficult and dangerous thing is suitable for training, but only that which is conducive to success in achieving the object of our effort.","originalLang":"en","tags":["Success"]},{"content":"The key is to keep company only with people who uplift you, whose presence calls forth your best.","original":"The key is to keep company only with people who uplift you, whose presence calls forth your best.","originalLang":"en","tags":["Inspirational"]},{"content":"Difficulties are things that show a person what they are.","original":"Difficulties are things that show a person what they are.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Practice yourself, for heaven's sake in little things, and then proceed to greater.","original":"Practice yourself, for heaven's sake in little things, and then proceed to greater.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Nature gave us one tongue and two ears so we could hear twice as much as we speak.","original":"Nature gave us one tongue and two ears so we could hear twice as much as we speak.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Freedom is the right to live as we wish.","original":"Freedom is the right to live as we wish.","originalLang":"en","tags":["Freedom"]},{"content":"There is only one way to happiness and that is to cease worrying about things which are beyond the power of our will.","original":"There is only one way to happiness and that is to cease worrying about things which are beyond the power of our will.","originalLang":"en","tags":["Happiness"]},{"content":"He is a wise man who does not grieve for the things which he has not but rejoices for those which he has.","original":"He is a wise man who does not grieve for the things which he has not but rejoices for those which he has.","originalLang":"en","tags":["Famous Quotes"]},{"content":"When you are offended at any man's fault, turn to yourself and study your own failings. Then you will forget your anger.","original":"When you are offended at any man's fault, turn to yourself and study your own failings. Then you will forget your anger.","originalLang":"en","tags":["Famous Quotes"]},{"content":"No man is free who is not master of himself.","original":"No man is free who is not master of himself.","originalLang":"en","tags":["Famous Quotes"]},{"content":"It's not what happens to you, but how you react to it that matters.","original":"It's not what happens to you, but how you react to it that matters.","originalLang":"en","tags":["Famous Quotes","Wisdom"]},{"content":"Make the best use of what is in your power and take the rest as it happens.","original":"Make the best use of what is in your power and take the rest as it happens.","originalLang":"en","tags":["Famous Quotes"]},{"content":"One that desires to excel should endeavor in those things that are in themselves most excellent.","original":"One that desires to excel should endeavor in those things that are in themselves most excellent.","originalLang":"en","tags":["Famous Quotes"]},{"content":"It is impossible for a man to learn what he thinks he already knows.","original":"It is impossible for a man to learn what he thinks he already knows.","originalLang":"en","tags":["Famous Quotes"]},{"content":"If you seek truth, you will not seek victory by dishonorable means, and if you find truth you will become invincible.","original":"If you seek truth, you will not seek victory by dishonorable means, and if you find truth you will become invincible.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Know, first, who you are, and then adorn yourself accordingly.","original":"Know, first, who you are, and then adorn yourself accordingly.","originalLang":"en","tags":["Famous Quotes"]},{"content":"We have two ears and one mouth so that we can listen twice as much as we speak.","original":"We have two ears and one mouth so that we can listen twice as much as we speak.","originalLang":"en","tags":["Famous Quotes"]},{"content":"The world turns aside to let any man pass who knows where he is going.","original":"The world turns aside to let any man pass who knows where he is going.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Keep silence for the most part, and speak only when you must, and then briefly.","original":"Keep silence for the most part, and speak only when you must, and then briefly.","originalLang":"en","tags":["Famous Quotes"]},{"content":"First say to yourself what you would be; and then do what you have to do.","original":"First say to yourself what you would be; and then do what you have to do.","originalLang":"en","tags":["Famous Quotes"]},{"content":"It is the nature of the wise to resist pleasures, but the foolish to be a slave to them.","original":"It is the nature of the wise to resist pleasures, but the foolish to be a slave to them.","originalLang":"en","tags":["Wisdom"]},{"content":"Men are disturbed not by things, but by the view which they take of them.","original":"Men are disturbed not by things, but by the view which they take of them.","originalLang":"en","tags":["Famous Quotes"]}]},"confucius":{"name":"孔子","nameEn":"Confucius","school":"东方智慧","era":"551-479 BC","originalLang":"zh","core":"仁、礼、中庸、君子之道、学而不厌","style":"温厚但绝不软弱。修身齐家治国平天下，起点永远是自身的修养。","quotes":[{"content":"Choose a job you love, and you will never have to work a day in your life.","original":"Choose a job you love, and you will never have to work a day in your life.","originalLang":"en","tags":["Inspirational","Success","Life"]},{"content":"They must often change, who would be constant in happiness or wisdom.","original":"They must often change, who would be constant in happiness or wisdom.","originalLang":"en","tags":["Famous Quotes","Wisdom"]},{"content":"A youth, when at home, should be filial and, abroad, respectful to his elders. He should be earnest and truthful. He should overflow in love to all and cultivate the friendship of the good. When he has time and opportunity, after the performance of these things, he should employ them in polite studies.","original":"A youth, when at home, should be filial and, abroad, respectful to his elders. He should be earnest and truthful. He should overflow in love to all and cultivate the friendship of the good. When he has time and opportunity, after the performance of these things, he should employ them in polite studies.","originalLang":"en","tags":["Friendship"]},{"content":"What you do not want done to yourself, do not do to others.","original":"What you do not want done to yourself, do not do to others.","originalLang":"en","tags":["Wisdom"]},{"content":"When you see a man of worth, think of how you may emulate him. When you see one who is unworthy, examine yourself.","original":"When you see a man of worth, think of how you may emulate him. When you see one who is unworthy, examine yourself.","originalLang":"en","tags":["Wisdom"]},{"content":"It does not matter how slowly you go as long as you do not stop.","original":"It does not matter how slowly you go as long as you do not stop.","originalLang":"en","tags":["Famous Quotes","Inspirational"]},{"content":"Fine words and an insinuating appearance are seldom associated with true virtue","original":"Fine words and an insinuating appearance are seldom associated with true virtue","originalLang":"en","tags":["Wisdom"]},{"content":"The superior man acts before he speaks, and afterwards speaks according to his action.","original":"The superior man acts before he speaks, and afterwards speaks according to his action.","originalLang":"en","tags":["Wisdom"]},{"content":"I will not be concerned at other men's not knowing me; I will be concerned at my own want of ability.","original":"I will not be concerned at other men's not knowing me; I will be concerned at my own want of ability.","originalLang":"en","tags":["Wisdom"]},{"content":"To be wrong is nothing unless you continue to remember it.","original":"To be wrong is nothing unless you continue to remember it.","originalLang":"en","tags":["Wisdom"]},{"content":"It is more shameful to distrust our friends than to be deceived by them.","original":"It is more shameful to distrust our friends than to be deceived by them.","originalLang":"en","tags":["Friendship","Famous Quotes"]},{"content":"Life is really simple, but we insist on making it complicated.","original":"Life is really simple, but we insist on making it complicated.","originalLang":"en","tags":["Wisdom"]},{"content":"Sincerity is the way of Heaven. The attainment of sincerity is the way of men.","original":"Sincerity is the way of Heaven. The attainment of sincerity is the way of men.","originalLang":"en","tags":["Wisdom"]},{"content":"To give oneself earnestly to the duties due to men, and, while respecting spiritual beings, to keep aloof from them, may be called wisdom.","original":"To give oneself earnestly to the duties due to men, and, while respecting spiritual beings, to keep aloof from them, may be called wisdom.","originalLang":"en","tags":["Wisdom"]},{"content":"Our greatest glory is not in never falling, but in rising every time we fall.","original":"Our greatest glory is not in never falling, but in rising every time we fall.","originalLang":"en","tags":["Wisdom"]},{"content":"The Superior Man is aware of Righteousness, the inferior man is aware of advantage.","original":"The Superior Man is aware of Righteousness, the inferior man is aware of advantage.","originalLang":"en","tags":["Wisdom"]},{"content":"Silence is the true friend that never betrays.","original":"Silence is the true friend that never betrays.","originalLang":"en","tags":["Wisdom"]},{"content":"Everything has beauty, but not everyone sees it.","original":"Everything has beauty, but not everyone sees it.","originalLang":"en","tags":["Wisdom"]},{"content":"Ability will never catch up with the demand for it.","original":"Ability will never catch up with the demand for it.","originalLang":"en","tags":["Wisdom"]},{"content":"There are three methods to gaining wisdom. The first is reflection, which is the highest. The second is limitation, which is the easiest. The third is experience, which is the bitterest.","original":"There are three methods to gaining wisdom. The first is reflection, which is the highest. The second is limitation, which is the easiest. The third is experience, which is the bitterest.","originalLang":"en","tags":["Wisdom"]},{"content":"I am not bothered by the fact that I am unknown. I am bothered when I do not know others.","original":"I am not bothered by the fact that I am unknown. I am bothered when I do not know others.","originalLang":"en","tags":["Wisdom"]},{"content":"The more you know yourself, the more you forgive yourself.","original":"The more you know yourself, the more you forgive yourself.","originalLang":"en","tags":["Wisdom"]},{"content":"The superior man is modest in his speech but exceeds in his actions.","original":"The superior man is modest in his speech but exceeds in his actions.","originalLang":"en","tags":["Wisdom"]},{"content":"When you meet someone better than yourself, turn your thoughts to becoming his equal. When you meet someone not as good as you are, look within and examine your own self.","original":"When you meet someone better than yourself, turn your thoughts to becoming his equal. When you meet someone not as good as you are, look within and examine your own self.","originalLang":"en","tags":["Wisdom"]},{"content":"Reviewing what you have learned and learning anew, you are fit to be a teacher.","original":"Reviewing what you have learned and learning anew, you are fit to be a teacher.","originalLang":"en","tags":["Wisdom"]},{"content":"To study and not think is a waste. To think and not study is dangerous.","original":"To study and not think is a waste. To think and not study is dangerous.","originalLang":"en","tags":["Wisdom"]},{"content":"By three methods we may learn wisdom: First, by reflection, which is noblest; Second, by imitation, which is easiest; and third by experience, which is the bitterest.","original":"By three methods we may learn wisdom: First, by reflection, which is noblest; Second, by imitation, which is easiest; and third by experience, which is the bitterest.","originalLang":"en","tags":["Wisdom"]},{"content":"The will to win, the desire to succeed, the urge to reach your full potential... these are the keys that will unlock the door to personal excellence.","original":"The will to win, the desire to succeed, the urge to reach your full potential... these are the keys that will unlock the door to personal excellence.","originalLang":"en","tags":["Inspirational"]},{"content":"The superior man is satisfied and composed; the mean man is always full of distress.","original":"The superior man is satisfied and composed; the mean man is always full of distress.","originalLang":"en","tags":["Wisdom"]},{"content":"When it is obvious that the goals cannot be reached, don't adjust the goals, adjust the action steps.","original":"When it is obvious that the goals cannot be reached, don't adjust the goals, adjust the action steps.","originalLang":"en","tags":["Famous Quotes","Wisdom"]},{"content":"Being in humaneness is good. If we select other goodness and thus are far apart from humaneness, how can we be the wise?","original":"Being in humaneness is good. If we select other goodness and thus are far apart from humaneness, how can we be the wise?","originalLang":"en","tags":["Wisdom"]},{"content":"I want you to be everything that's you, deep at the center of your being.","original":"I want you to be everything that's you, deep at the center of your being.","originalLang":"en","tags":["Wisdom"]},{"content":"The more man meditates upon good thoughts, the better will be his world and the world at large.","original":"The more man meditates upon good thoughts, the better will be his world and the world at large.","originalLang":"en","tags":["Inspirational"]},{"content":"Learning without reflection is a waste, reflection without learning is dangerous.","original":"Learning without reflection is a waste, reflection without learning is dangerous.","originalLang":"en","tags":["Wisdom"]},{"content":"I hear and I forget. I see and I remember. I do and I understand.","original":"I hear and I forget. I see and I remember. I do and I understand.","originalLang":"en","tags":["Wisdom"]},{"content":"He who wishes to secure the good of others, has already secured his own.","original":"He who wishes to secure the good of others, has already secured his own.","originalLang":"en","tags":["Wisdom"]},{"content":"The cautious seldom err.","original":"The cautious seldom err.","originalLang":"en","tags":["Wisdom"]},{"content":"When you see a good person, think of becoming like him. When you see someone not so good, reflect on your own weak points.","original":"When you see a good person, think of becoming like him. When you see someone not so good, reflect on your own weak points.","originalLang":"en","tags":["Wisdom"]},{"content":"Study the past, if you would divine the future.","original":"Study the past, if you would divine the future.","originalLang":"en","tags":["Wisdom"]},{"content":"Wherever you go, go with all your heart.","original":"Wherever you go, go with all your heart.","originalLang":"en","tags":["Wisdom"]},{"content":"If you look into your own heart, and you find nothing wrong there, what is there to worry about? What is there to fear?","original":"If you look into your own heart, and you find nothing wrong there, what is there to worry about? What is there to fear?","originalLang":"en","tags":["Wisdom"]},{"content":"To be wronged is nothing unless you continue to remember it.","original":"To be wronged is nothing unless you continue to remember it.","originalLang":"en","tags":["Wisdom"]},{"content":"Wisdom, compassion, and courage are the three universally recognized moral qualities of men.","original":"Wisdom, compassion, and courage are the three universally recognized moral qualities of men.","originalLang":"en","tags":["Wisdom"]},{"content":"The superior man understands what is right; the inferior man understands what will sell.","original":"The superior man understands what is right; the inferior man understands what will sell.","originalLang":"en","tags":["Business"]}]},"laozi":{"name":"老子","nameEn":"Laozi","school":"东方智慧","era":"6th century BC","originalLang":"zh","core":"道法自然、无为而无不为、柔弱胜刚强、反者道之动","style":"玄妙而透辟。用最少的话推翻最多的执念，不争即是最大的争。","quotes":[{"content":"If you correct your mind, the rest of your life will fall into place.","original":"If you correct your mind, the rest of your life will fall into place.","originalLang":"en","tags":["Life"]},{"content":"Doing nothing is better than being busy doing nothing.","original":"Doing nothing is better than being busy doing nothing.","originalLang":"en","tags":["Wisdom"]},{"content":"Great acts are made up of small deeds.","original":"Great acts are made up of small deeds.","originalLang":"en","tags":["Wisdom"]},{"content":"He who talks more is sooner exhausted.","original":"He who talks more is sooner exhausted.","originalLang":"en","tags":["Wisdom"]},{"content":"Silence is a source of great strength.","original":"Silence is a source of great strength.","originalLang":"en","tags":["Wisdom"]},{"content":"All difficult things have their origin in that which is easy, and great things in that which is small.","original":"All difficult things have their origin in that which is easy, and great things in that which is small.","originalLang":"en","tags":["Wisdom"]},{"content":"In dwelling, live close to the ground. In thinking, keep to the simple. In conflict, be fair and generous. In governing, don't try to control. In work, do what you enjoy. In family life, be completely present.","original":"In dwelling, live close to the ground. In thinking, keep to the simple. In conflict, be fair and generous. In governing, don't try to control. In work, do what you enjoy. In family life, be completely present.","originalLang":"en","tags":["Wisdom"]},{"content":"He who knows that enough is enough will always have enough.","original":"He who knows that enough is enough will always have enough.","originalLang":"en","tags":["Wisdom"]},{"content":"By letting it go it all gets done. The world is won by those who let it go. But when you try and try. The world is beyond the winning.","original":"By letting it go it all gets done. The world is won by those who let it go. But when you try and try. The world is beyond the winning.","originalLang":"en","tags":["Wisdom"]},{"content":"He who is contented is rich.","original":"He who is contented is rich.","originalLang":"en","tags":["Wisdom"]},{"content":"At the center of your being, you have the answer; you know who you are, and you know what you want.","original":"At the center of your being, you have the answer; you know who you are, and you know what you want.","originalLang":"en","tags":["Wisdom"]},{"content":"He who conquers others is strong; He who conquers himself is mighty.","original":"He who conquers others is strong; He who conquers himself is mighty.","originalLang":"en","tags":["Wisdom"]},{"content":"Give a man a fish and you feed him for a day. Teach him how to fish and you feed him for a lifetime.","original":"Give a man a fish and you feed him for a day. Teach him how to fish and you feed him for a lifetime.","originalLang":"en","tags":["Wisdom"]},{"content":"Nothing is softer or more flexible than water, yet nothing can resist it.","original":"Nothing is softer or more flexible than water, yet nothing can resist it.","originalLang":"en","tags":["Wisdom"]},{"content":"The power of intuitive understanding will protect you from harm until the end of your days.","original":"The power of intuitive understanding will protect you from harm until the end of your days.","originalLang":"en","tags":["Wisdom"]},{"content":"Great indeed is the sublimity of the Creative, to which all beings owe their beginning, and which permeates all heaven.","original":"Great indeed is the sublimity of the Creative, to which all beings owe their beginning, and which permeates all heaven.","originalLang":"en","tags":["Wisdom"]},{"content":"He who knows, does not speak. He who speaks, does not know.","original":"He who knows, does not speak. He who speaks, does not know.","originalLang":"en","tags":["Wisdom"]},{"content":"Be the chief but never the lord.","original":"Be the chief but never the lord.","originalLang":"en","tags":["Wisdom"]},{"content":"To see things in the seed, that is genius.","original":"To see things in the seed, that is genius.","originalLang":"en","tags":["Wisdom"]},{"content":"I have just three things to teach: simplicity, patience, compassion. These three are your greatest treasures.","original":"I have just three things to teach: simplicity, patience, compassion. These three are your greatest treasures.","originalLang":"en","tags":["Famous Quotes","Wisdom"]},{"content":"The key to growth is the introduction of higher dimensions of consciousness into our awareness.","original":"The key to growth is the introduction of higher dimensions of consciousness into our awareness.","originalLang":"en","tags":["Wisdom"]},{"content":"The journey of a thousand miles begins with one step.","original":"The journey of a thousand miles begins with one step.","originalLang":"en","tags":["Famous Quotes","Wisdom"]},{"content":"Knowing others is wisdom, knowing yourself is Enlightenment.","original":"Knowing others is wisdom, knowing yourself is Enlightenment.","originalLang":"en","tags":["Wisdom"]},{"content":"To lead people walk behind them.","original":"To lead people walk behind them.","originalLang":"en","tags":["Wisdom"]},{"content":"When you are content to be simply yourself and don't compare or compete, everybody will respect you.","original":"When you are content to be simply yourself and don't compare or compete, everybody will respect you.","originalLang":"en","tags":["Wisdom"]},{"content":"An ant on the move does more than a dozing ox","original":"An ant on the move does more than a dozing ox","originalLang":"en","tags":["Wisdom"]},{"content":"From wonder into wonder existence opens.","original":"From wonder into wonder existence opens.","originalLang":"en","tags":["Wisdom"]},{"content":"The wise man does not lay up his own treasures. The more he gives to others, the more he has for his own.","original":"The wise man does not lay up his own treasures. The more he gives to others, the more he has for his own.","originalLang":"en","tags":["Wisdom"]},{"content":"Do the difficult things while they are easy and do the great things while they are small. A journey of a thousand miles must begin with a single step.","original":"Do the difficult things while they are easy and do the great things while they are small. A journey of a thousand miles must begin with a single step.","originalLang":"en","tags":["Inspirational"]},{"content":"Anticipate the difficult by managing the easy.","original":"Anticipate the difficult by managing the easy.","originalLang":"en","tags":["Wisdom"]},{"content":"If you do not change direction, you may end up where you are heading.","original":"If you do not change direction, you may end up where you are heading.","originalLang":"en","tags":["Wisdom","Success"]},{"content":"When you realize there is nothing lacking, the whole world belongs to you.","original":"When you realize there is nothing lacking, the whole world belongs to you.","originalLang":"en","tags":["Wisdom"]},{"content":"If you would take, you must first give, this is the beginning of intelligence.","original":"If you would take, you must first give, this is the beginning of intelligence.","originalLang":"en","tags":["Wisdom"]},{"content":"A leader is best when people barely know he exists, when his work is done, his aim fulfilled, they will say: we did it ourselves.","original":"A leader is best when people barely know he exists, when his work is done, his aim fulfilled, they will say: we did it ourselves.","originalLang":"en","tags":["Wisdom","Leadership"]},{"content":"Music in the soul can be heard by the universe.","original":"Music in the soul can be heard by the universe.","originalLang":"en","tags":["Wisdom"]},{"content":"When I let go of what I am, I become what I might be.","original":"When I let go of what I am, I become what I might be.","originalLang":"en","tags":["Wisdom"]},{"content":"He who knows himself is enlightened.","original":"He who knows himself is enlightened.","originalLang":"en","tags":["Wisdom"]},{"content":"Kindness in words creates confidence. Kindness in thinking creates profoundness. Kindness in giving creates love.","original":"Kindness in words creates confidence. Kindness in thinking creates profoundness. Kindness in giving creates love.","originalLang":"en","tags":["Wisdom"]},{"content":"One who is too insistent on his own views, finds few to agree with him.","original":"One who is too insistent on his own views, finds few to agree with him.","originalLang":"en","tags":["Wisdom"]},{"content":"He who knows others is wise. He who knows himself is enlightened.","original":"He who knows others is wise. He who knows himself is enlightened.","originalLang":"en","tags":["Wisdom"]},{"content":"He who controls others may be powerful, but he who has mastered himself is mightier still.","original":"He who controls others may be powerful, but he who has mastered himself is mightier still.","originalLang":"en","tags":["Wisdom"]}]},"suntzu":{"name":"孙子","nameEn":"Sun Tzu","school":"东方智慧","era":"544-496 BC","originalLang":"zh","core":"知己知彼、不战而屈人之兵、兵者诡道","style":"精确冷酷。竞争的本质不是勇猛而是计算和认知优势。","quotes":[{"content":"The supreme art of war is to subdue the enemy without fighting.","original":"The supreme art of war is to subdue the enemy without fighting.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Can you imagine what I would do if I could do all I can?","original":"Can you imagine what I would do if I could do all I can?","originalLang":"en","tags":["Famous Quotes"]},{"content":"You have to believe in yourself.","original":"You have to believe in yourself.","originalLang":"en","tags":["Famous Quotes"]},{"content":"知己知彼，百战不殆。","original":"知己知彼，百战不殆。","tags":["策略","认知"],"originalLang":"zh"},{"content":"不战而屈人之兵，善之善者也。","original":"不战而屈人之兵，善之善者也。","tags":["战略","境界"],"originalLang":"zh"},{"content":"上兵伐谋，其次伐交，其次伐兵，其下攻城。","original":"上兵伐谋，其次伐交，其次伐兵，其下攻城。","tags":["策略","层次"],"originalLang":"zh"},{"content":"兵无常势，水无常形。能因敌变化而取胜者，谓之神。","original":"兵无常势，水无常形。","tags":["变化","灵活"],"originalLang":"zh"},{"content":"胜兵先胜而后求战，败兵先战而后求胜。","original":"胜兵先胜而后求战，败兵先战而后求胜。","tags":["准备","胜利"],"originalLang":"zh"},{"content":"知可以战与不可以战者胜。","original":"知可以战与不可以战者胜。","tags":["判断","时机"],"originalLang":"zh"},{"content":"其疾如风，其徐如林，侵掠如火，不动如山。","original":"其疾如风，其徐如林，侵掠如火，不动如山。","tags":["行动","纪律"],"originalLang":"zh"}]},"plato":{"name":"柏拉图","nameEn":"Plato","school":"理性主义","era":"428-348 BC","originalLang":"grc","core":"理念论、洞穴比喻、哲人王、灵魂三分","style":"追问本质。我们看到的只是墙上的影子，真正的实在在洞穴之外。","quotes":[{"content":"Bodily exercise, when compulsory, does no harm to the body; but knowledge which is acquired under compulsion obtains no hold on the mind.","original":"Bodily exercise, when compulsory, does no harm to the body; but knowledge which is acquired under compulsion obtains no hold on the mind.","originalLang":"en","tags":["Famous Quotes"]},{"content":"There are three classes of men; lovers of wisdom, lovers of honor, and lovers of gain.","original":"There are three classes of men; lovers of wisdom, lovers of honor, and lovers of gain.","originalLang":"en","tags":["Wisdom"]},{"content":"Wisdom alone is the science of other sciences.","original":"Wisdom alone is the science of other sciences.","originalLang":"en","tags":["Wisdom"]},{"content":"Wise men talk because they have something to say; fools, because they have to say something.","original":"Wise men talk because they have something to say; fools, because they have to say something.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Wise men speak because they have something to say; Fools because they have to say something.","original":"Wise men speak because they have something to say; Fools because they have to say something.","originalLang":"en","tags":["Famous Quotes"]},{"content":"A good decision is based on knowledge and not on numbers.","original":"A good decision is based on knowledge and not on numbers.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Knowledge without justice ought to be called cunning rather than wisdom.","original":"Knowledge without justice ought to be called cunning rather than wisdom.","originalLang":"en","tags":["Wisdom"]},{"content":"Cunning... is but the low mimic of wisdom.","original":"Cunning... is but the low mimic of wisdom.","originalLang":"en","tags":["Wisdom"]},{"content":"Good actions give strength to ourselves and inspire good actions in others.","original":"Good actions give strength to ourselves and inspire good actions in others.","originalLang":"en","tags":["Famous Quotes"]},{"content":"The man who makes everything that leads to happiness depends upon himself, and not upon other men, has adopted the very best plan for living happily. This is the man of moderation, the man of manly character and of wisdom.","original":"The man who makes everything that leads to happiness depends upon himself, and not upon other men, has adopted the very best plan for living happily. This is the man of moderation, the man of manly character and of wisdom.","originalLang":"en","tags":["Wisdom"]},{"content":"Love is a serious mental disease.","original":"Love is a serious mental disease.","originalLang":"en","tags":["Famous Quotes"]}]},"kant":{"name":"康德","nameEn":"Immanuel Kant","school":"理性主义","era":"1724-1804","originalLang":"de","core":"道德律令、物自体、二律背反、启蒙即敢于运用理性","style":"严谨深刻。头顶的星空和心中的道德律——自由不在随心所欲，而在自我立法。","quotes":[{"content":"All our knowledge begins with the senses, proceeds then to the understanding, and ends with reason. There is nothing higher than reason.","original":"All our knowledge begins with the senses, proceeds then to the understanding, and ends with reason. There is nothing higher than reason.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Science is organized knowledge. Wisdom is organized life.","original":"Science is organized knowledge. Wisdom is organized life.","originalLang":"en","tags":["Famous Quotes","Wisdom"]},{"content":"有两种东西，我对它们的思考越是深沉和持久，它们在我心中唤起的惊奇和敬畏就越日新月异——头顶的星空和心中的道德律。","original":"Der bestirnte Himmel über mir und das moralische Gesetz in mir.","tags":["道德","敬畏"],"originalLang":"de"},{"content":"要敢于运用你自己的理性！这就是启蒙的格言。","original":"Sapere aude! Habe Mut, dich deines eigenen Verstandes zu bedienen!","tags":["启蒙","理性"],"originalLang":"de"},{"content":"你要这样行动：使你的意志的准则始终能够同时成为一条普遍的立法原则。","original":"Handle nur nach derjenigen Maxime, durch die du zugleich wollen kannst, dass sie ein allgemeines Gesetz werde.","tags":["道德","义务"],"originalLang":"de"},{"content":"人是目的，而不仅仅是手段。","original":"Handle so, dass du die Menschheit, sowohl in deiner Person als in der Person eines jeden anderen, jederzeit zugleich als Zweck, niemals bloß als Mittel brauchst.","tags":["尊严","伦理"],"originalLang":"de"},{"content":"没有内容的思想是空洞的，没有概念的直观是盲目的。","original":"Gedanken ohne Inhalt sind leer, Anschauungen ohne Begriffe sind blind.","tags":["认识","理性"],"originalLang":"de"},{"content":"自由不是你想做什么就做什么，而是你不想做什么就能不做什么。","original":"Freiheit ist nicht das Vermögen, ohne Gesetz zu handeln, sondern das Vermögen, nach der Vorstellung von Gesetzen zu handeln.","tags":["自由","自律"],"originalLang":"de"},{"content":"知识始于感觉，然后进入知性，最后终结于理性。","original":"Alle unsere Erkenntnis hebt von den Sinnen an, geht von da zum Verstande und endigt bei der Vernunft.","tags":["认识","知识"],"originalLang":"de"}]},"schopenhauer":{"name":"叔本华","nameEn":"Arthur Schopenhauer","school":"理性主义","era":"1788-1860","originalLang":"de","core":"意志即痛苦、表象世界、艺术救赎、禁欲解脱","style":"悲观而诚实。生命即欲望的钟摆——在痛若与无聊之间来回摆动。","quotes":[{"content":"In action a great heart is the chief qualification. In work, a great head.","original":"In action a great heart is the chief qualification. In work, a great head.","originalLang":"en","tags":["Wisdom"]},{"content":"Every man takes the limits of his own field of vision for the limits of the world.","original":"Every man takes the limits of his own field of vision for the limits of the world.","originalLang":"en","tags":["Famous Quotes"]},{"content":"生命是一团欲望，欲望不满足便痛苦，满足便无聊。人生就在痛苦和无聊之间摇摆。","original":"Das Leben schwingt also, gleich einem Pendel, hin und her, zwischen dem Schmerz und der Langeweile.","tags":["欲望","痛苦"],"originalLang":"de"},{"content":"人可以做他想做的，但无法想要他想要的。","original":"Der Mensch kann zwar tun, was er will, aber er kann nicht wollen, was er will.","tags":["自由","意志"],"originalLang":"de"},{"content":"要么孤独，要么庸俗。","original":"Einsamkeit ist das Los aller hervorragenden Geister.","tags":["孤独","独立"],"originalLang":"de"},{"content":"财富就像海水：饮得越多，渴得越厉害。","original":"Der Reichtum gleicht dem Seewasser: je mehr man davon trinkt, desto durstiger wird man.","tags":["欲望","财富"],"originalLang":"de"},{"content":"音乐是意志本身的直接摹本。","original":"Die Musik ist die unmittelbare Abbildung des Willens selbst.","tags":["艺术","意志"],"originalLang":"de"},{"content":"一个人越是属于后世，他就越不为自己的时代所理解。","original":"Je mehr einer der Nachwelt angehört, desto mehr ist er ein Fremdling seiner Zeit.","tags":["孤独","理解"],"originalLang":"de"},{"content":"每个人都将自己视野的界限当作世界的界限。","original":"Jeder hält die Grenzen seines eigenen Gesichtskreises für die Grenzen der Welt.","tags":["认识","局限"],"originalLang":"de"},{"content":"我们感觉不到了的东西，对我们来说就等于没有。","original":"Was man nicht fühlt, das ist für einen nicht.","tags":["感受","存在"],"originalLang":"de"}]},"buddha":{"name":"佛陀","nameEn":"The Buddha","school":"超越视角","era":"5th century BC","originalLang":"pi","core":"四圣谛、八正道、缘起性空、离苦得乐","style":"超然慈悲。痛苦源于执取——放下不是放弃，而是从根源上看见无我的实相。","quotes":[{"content":"To have much learning and skill, to be well-trained in discipline, and good in speech — this is the highest blessing.","original":"To have much learning and skill, to be well-trained in discipline, and good in speech — this is the highest blessing.","originalLang":"en","tags":["Wisdom"]},{"content":"A single lamp may light hundreds of thousands of lamps without itself being diminished.","original":"A single lamp may light hundreds of thousands of lamps without itself being diminished.","originalLang":"en","tags":["Wisdom"]},{"content":"Your worst enemy cannot harm you as much as your own unguarded thoughts.","original":"Your worst enemy cannot harm you as much as your own unguarded thoughts.","originalLang":"en","tags":["Wisdom"]},{"content":"What is past is left behind. The future is yet unreached. Whatever quality is present, clearly see it right there.","original":"What is past is left behind. The future is yet unreached. Whatever quality is present, clearly see it right there.","originalLang":"en","tags":["Wisdom","Future"]},{"content":"I am not the first Buddha who came upon Earth, nor shall I be the last. In due time, another Buddha will arise in the world - a Holy One, a supremely enlightened One, endowed with wisdom in conduct, auspicious, knowing the universe, an incomparable leader of men, a master of angels and mortals.","original":"I am not the first Buddha who came upon Earth, nor shall I be the last. In due time, another Buddha will arise in the world - a Holy One, a supremely enlightened One, endowed with wisdom in conduct, auspicious, knowing the universe, an incomparable leader of men, a master of angels and mortals.","originalLang":"en","tags":["Wisdom"]},{"content":"Conditions fall apart. Persist with diligence.","original":"Conditions fall apart. Persist with diligence.","originalLang":"en","tags":["Wisdom"]},{"content":"Three things cannot be long hidden: the sun, the moon, and the truth.","original":"Three things cannot be long hidden: the sun, the moon, and the truth.","originalLang":"en","tags":["Wisdom"]},{"content":"Those who are free of resentful thoughts surely find peace.","original":"Those who are free of resentful thoughts surely find peace.","originalLang":"en","tags":["Wisdom"]},{"content":"Meditation brings wisdom, lack of meditation leaves ignorance. Know well what leads you forward and what holds you back and choose the path that leads to wisdom.","original":"Meditation brings wisdom, lack of meditation leaves ignorance. Know well what leads you forward and what holds you back and choose the path that leads to wisdom.","originalLang":"en","tags":["Wisdom"]},{"content":"All phenomena are preceded by the mind, created by the mind, and have the mind as their master.","original":"All phenomena are preceded by the mind, created by the mind, and have the mind as their master.","originalLang":"en","tags":["Wisdom"]},{"content":"Do I speak at the right time, or not? Do I speak of facts, or not? Do I speak gently or harshly? Do I speak profitable words or not? Do I speak with a kindly heart, or inwardly malicious?","original":"Do I speak at the right time, or not? Do I speak of facts, or not? Do I speak gently or harshly? Do I speak profitable words or not? Do I speak with a kindly heart, or inwardly malicious?","originalLang":"en","tags":["Wisdom"]},{"content":"Heedfulness is the path to the Deathless. Heedlessness is the path to death. The heedful die not. The heedless are as if already dead.","original":"Heedfulness is the path to the Deathless. Heedlessness is the path to death. The heedful die not. The heedless are as if already dead.","originalLang":"en","tags":["Wisdom"]},{"content":"Don’t sacrifice your own welfare for that of another, no matter how great. Realizing your own true welfare, be intent on just that.","original":"Don’t sacrifice your own welfare for that of another, no matter how great. Realizing your own true welfare, be intent on just that.","originalLang":"en","tags":["Wisdom"]},{"content":"I, too, do not envision a doctrine of self the clinging to which there would not arise sorrow, lamentation, pain, grief, and despair.","original":"I, too, do not envision a doctrine of self the clinging to which there would not arise sorrow, lamentation, pain, grief, and despair.","originalLang":"en","tags":["Wisdom"]},{"content":"You should ignore that person’s impure behavior by way of speech and body, and focus on the fact that they get an openness and clarity of heart from time to time. That’s how to get rid of resentment for that person.","original":"You should ignore that person’s impure behavior by way of speech and body, and focus on the fact that they get an openness and clarity of heart from time to time. That’s how to get rid of resentment for that person.","originalLang":"en","tags":["Wisdom"]},{"content":"Let my skin and sinews and bones dry up, together with all the flesh and blood of my body! I welcome it! But I will not move from this spot until I have attained the supreme and final wisdom.","original":"Let my skin and sinews and bones dry up, together with all the flesh and blood of my body! I welcome it! But I will not move from this spot until I have attained the supreme and final wisdom.","originalLang":"en","tags":["Wisdom"]},{"content":"By oneself is evil done; by oneself is one defiled. By oneself is evil left undone; by oneself is one made pure.","original":"By oneself is evil done; by oneself is one defiled. By oneself is evil left undone; by oneself is one made pure.","originalLang":"en","tags":["Wisdom"]},{"content":"Much though he recites the sacred texts, but acts not accordingly, that heedless man is like a cowherd who only counts the cows of others","original":"Much though he recites the sacred texts, but acts not accordingly, that heedless man is like a cowherd who only counts the cows of others","originalLang":"en","tags":["Wisdom"]},{"content":"Do not scorn what you have received, nor envy the gains of others. He who envies others does not obtain peace of mind.","original":"Do not scorn what you have received, nor envy the gains of others. He who envies others does not obtain peace of mind.","originalLang":"en","tags":["Wisdom"]},{"content":"In the sky there are no tracks. Outside there is no recluse. There are no conditioned things that are eternal. There is no instability in the Buddhas.","original":"In the sky there are no tracks. Outside there is no recluse. There are no conditioned things that are eternal. There is no instability in the Buddhas.","originalLang":"en","tags":["Wisdom"]},{"content":"Better than a thousand hollow words, is one word that brings peace.","original":"Better than a thousand hollow words, is one word that brings peace.","originalLang":"en","tags":["Wisdom"]},{"content":"One should not hurt others if one loves oneself.","original":"One should not hurt others if one loves oneself.","originalLang":"en","tags":["Wisdom"]},{"content":"Drop by drop is the water pot filled. Likewise, the wise man, gathering it little by little, fills himself with good.","original":"Drop by drop is the water pot filled. Likewise, the wise man, gathering it little by little, fills himself with good.","originalLang":"en","tags":["Wisdom"]},{"content":"'As I am, so are they; as they are, so am I.' Comparing others with oneself, do not kill nor cause others to kill.","original":"'As I am, so are they; as they are, so am I.' Comparing others with oneself, do not kill nor cause others to kill.","originalLang":"en","tags":["Wisdom","Virtue"]},{"content":"A disciplined mind brings happiness.","original":"A disciplined mind brings happiness.","originalLang":"en","tags":["Wisdom","Happiness"]},{"content":"A noble one produces an abundance of merit by having a compassionate mind towards all living beings.","original":"A noble one produces an abundance of merit by having a compassionate mind towards all living beings.","originalLang":"en","tags":["Wisdom","Love"]},{"content":"A wise person should be urgently moved on occasions that make for urgency.","original":"A wise person should be urgently moved on occasions that make for urgency.","originalLang":"en","tags":["Wisdom","Motivational"]},{"content":"All experiences are preceded by mind, having mind as their master, created by mind.","original":"All experiences are preceded by mind, having mind as their master, created by mind.","originalLang":"en","tags":["Wisdom","Self"]},{"content":"Ardently do today what must be done. Who knows? Tomorrow, death comes.","original":"Ardently do today what must be done. Who knows? Tomorrow, death comes.","originalLang":"en","tags":["Wisdom","Motivational"]},{"content":"Conquer anger with non-anger. Conquer badness with goodness. Conquer meanness with generosity. Conquer dishonesty with truth.","original":"Conquer anger with non-anger. Conquer badness with goodness. Conquer meanness with generosity. Conquer dishonesty with truth.","originalLang":"en","tags":["Wisdom","Virtue","Love"]},{"content":"Delight in heedfulness! Guard well your thoughts!","original":"Delight in heedfulness! Guard well your thoughts!","originalLang":"en","tags":["Wisdom","Virtue"]},{"content":"Give, even if you only have a little.","original":"Give, even if you only have a little.","originalLang":"en","tags":["Wisdom"]},{"content":"I do not dispute with the world; rather it is the world that disputes with me.","original":"I do not dispute with the world; rather it is the world that disputes with me.","originalLang":"en","tags":["Wisdom","Philosophy"]},{"content":"If with a pure mind a person speaks or acts, happiness follows them like a never-departing shadow.","original":"If with a pure mind a person speaks or acts, happiness follows them like a never-departing shadow.","originalLang":"en","tags":["Wisdom","Happiness"]},{"content":"It is in the nature of things that joy arises in a person free from remorse.","original":"It is in the nature of things that joy arises in a person free from remorse.","originalLang":"en","tags":["Wisdom","Happiness"]},{"content":"Just as a mother would protect her only child with her life, even so let one cultivate a boundless love towards all beings.","original":"Just as a mother would protect her only child with her life, even so let one cultivate a boundless love towards all beings.","originalLang":"en","tags":["Wisdom","Love"]},{"content":"Meditate … do not delay, lest you later regret it.","original":"Meditate … do not delay, lest you later regret it.","originalLang":"en","tags":["Wisdom","Motivational"]},{"content":"One should train in deeds of merit—generosity, a balanced life, developing a loving mind—that yield long-lasting happiness.","original":"One should train in deeds of merit—generosity, a balanced life, developing a loving mind—that yield long-lasting happiness.","originalLang":"en","tags":["Wisdom","Happiness"]},{"content":"Purity and impurity depend on oneself; no one can purify another.","original":"Purity and impurity depend on oneself; no one can purify another.","originalLang":"en","tags":["Wisdom","Self","Self Help"]},{"content":"Radiate boundless love towards the entire world…","original":"Radiate boundless love towards the entire world…","originalLang":"en","tags":["Wisdom","Love"]},{"content":"Should a seeker not find a companion who is better or equal, let them resolutely pursue a solitary course.","original":"Should a seeker not find a companion who is better or equal, let them resolutely pursue a solitary course.","originalLang":"en","tags":["Wisdom","Philosophy"]},{"content":"Should you find a wise critic to point out your faults, follow him as you would a guide to hidden treasure.","original":"Should you find a wise critic to point out your faults, follow him as you would a guide to hidden treasure.","originalLang":"en","tags":["Wisdom","Wisdom"]},{"content":"Speak only endearing speech, speech that is welcomed. Speech, when it brings no evil to others, is a pleasant thing.","original":"Speak only endearing speech, speech that is welcomed. Speech, when it brings no evil to others, is a pleasant thing.","originalLang":"en","tags":["Wisdom","Virtue","Honor"]},{"content":"There is no fear for one whose mind is not filled with desires.","original":"There is no fear for one whose mind is not filled with desires.","originalLang":"en","tags":["Wisdom","Philosophy"]},{"content":"To support mother and father, to cherish partner and children, and to be engaged in peaceful occupation — this is the greatest blessing.","original":"To support mother and father, to cherish partner and children, and to be engaged in peaceful occupation — this is the greatest blessing.","originalLang":"en","tags":["Wisdom","Family"]},{"content":"Whatever has the nature of arising has the nature of ceasing.","original":"Whatever has the nature of arising has the nature of ceasing.","originalLang":"en","tags":["Wisdom","Philosophy"]},{"content":"Whatever is not yours: let go of it. Your letting go of it will be for your long-term happiness & benefit.","original":"Whatever is not yours: let go of it. Your letting go of it will be for your long-term happiness & benefit.","originalLang":"en","tags":["Wisdom","Happiness"]},{"content":"Better than a thousand useless words is one useful word, upon hearing which one attains peace.","original":"Better than a thousand useless words is one useful word, upon hearing which one attains peace.","originalLang":"en","tags":["Wisdom","Character"]},{"content":"It's a good thing to be satisfied with what one has.","original":"It's a good thing to be satisfied with what one has.","originalLang":"en","tags":["Wisdom","Self Help"]},{"content":"Let none find fault with others; let none see the omissions and commissions of others. But let one see one's own acts, done and undone.","original":"Let none find fault with others; let none see the omissions and commissions of others. But let one see one's own acts, done and undone.","originalLang":"en","tags":["Wisdom","Honor"]},{"content":"Should someone do good, let them do it again and again. They should develop this habit, for the accumulation of goodness brings joy.","original":"Should someone do good, let them do it again and again. They should develop this habit, for the accumulation of goodness brings joy.","originalLang":"en","tags":["Wisdom","Motivational"]},{"content":"The thing that is disliked by me is also disliked by others. Since I dislike this thing, how can I inflict it on someone else?","original":"The thing that is disliked by me is also disliked by others. Since I dislike this thing, how can I inflict it on someone else?","originalLang":"en","tags":["Wisdom","Philosophy","Virtue","Honor"]},{"content":"'All conditioned things are impermanent' — when one sees this with wisdom, one turns away from suffering.","original":"'All conditioned things are impermanent' — when one sees this with wisdom, one turns away from suffering.","originalLang":"en","tags":["Wisdom","Philosophy"]},{"content":"'As I am, so are these. As are these, so am I.' Drawing the parallel to yourself, neither kill nor get others to kill.","original":"'As I am, so are these. As are these, so am I.' Drawing the parallel to yourself, neither kill nor get others to kill.","originalLang":"en","tags":["Wisdom","Virtue","Honor"]},{"content":"A mind unruffled by the vagaries of fortune, from sorrow freed, from defilements cleansed, from fear liberated — this is the greatest blessing.","original":"A mind unruffled by the vagaries of fortune, from sorrow freed, from defilements cleansed, from fear liberated — this is the greatest blessing.","originalLang":"en","tags":["Wisdom"]},{"content":"All tremble at violence; all fear death. Putting oneself in the place of another, one should not kill nor cause another to kill.","original":"All tremble at violence; all fear death. Putting oneself in the place of another, one should not kill nor cause another to kill.","originalLang":"en","tags":["Wisdom","Virtue","Honor"]},{"content":"As a water bead on a lotus leaf, as water on a red lily, does not adhere, so the sage does not adhere to the seen, the heard, or the sensed.","original":"As a water bead on a lotus leaf, as water on a red lily, does not adhere, so the sage does not adhere to the seen, the heard, or the sensed.","originalLang":"en","tags":["Wisdom","Philosophy"]},{"content":"As an elephant in the battlefield withstands arrows shot from bows all around, even so shall I endure abuse.","original":"As an elephant in the battlefield withstands arrows shot from bows all around, even so shall I endure abuse.","originalLang":"en","tags":["Wisdom","Character","Courage"]},{"content":"Better it is to live one day seeing the rise and fall of things than to live a hundred years without ever seeing the rise and fall of things.","original":"Better it is to live one day seeing the rise and fall of things than to live a hundred years without ever seeing the rise and fall of things.","originalLang":"en","tags":["Wisdom","Philosophy"]},{"content":"Both formerly and now, it is only suffering that I describe, and the cessation of suffering.","original":"Both formerly and now, it is only suffering that I describe, and the cessation of suffering.","originalLang":"en","tags":["Wisdom","Happiness"]},{"content":"Ceasing to do evil, Cultivating the good, Purifying the heart: This is the teaching of the Buddhas.","original":"Ceasing to do evil, Cultivating the good, Purifying the heart: This is the teaching of the Buddhas.","originalLang":"en","tags":["Wisdom","Virtue"]},{"content":"Hatred is never appeased by hatred in this world. By non-hatred alone is hatred appeased. This is a law eternal.","original":"Hatred is never appeased by hatred in this world. By non-hatred alone is hatred appeased. This is a law eternal.","originalLang":"en","tags":["Wisdom","Love"]},{"content":"He who can curb his wrath as soon as it arises, as a timely antidote will check snake's venom that so quickly spreads, — such a monk gives up the here and the beyond, just as a serpent sheds its worn-out skin.","original":"He who can curb his wrath as soon as it arises, as a timely antidote will check snake's venom that so quickly spreads, — such a monk gives up the here and the beyond, just as a serpent sheds its worn-out skin.","originalLang":"en","tags":["Wisdom","Self Help"]},{"content":"If a man going down into a river, swollen and swiftly flowing, is carried away by the current — how can he help others across? – The Buddha","original":"If a man going down into a river, swollen and swiftly flowing, is carried away by the current — how can he help others across? – The Buddha","originalLang":"en","tags":["Wisdom"]},{"content":"Irrigators channel waters; fletchers straighten arrows; carpenters bend wood; the wise master themselves.","original":"Irrigators channel waters; fletchers straighten arrows; carpenters bend wood; the wise master themselves.","originalLang":"en","tags":["Wisdom","Self Help","Character"]},{"content":"Just as a solid rock is not shaken by the storm, even so the wise are not affected by praise or blame.","original":"Just as a solid rock is not shaken by the storm, even so the wise are not affected by praise or blame.","originalLang":"en","tags":["Wisdom","Character"]},{"content":"Know from the rivers in clefts and in crevices: those in small channels flow noisily, the great flow silent. Whatever's not full makes noise. Whatever is full is quiet.","original":"Know from the rivers in clefts and in crevices: those in small channels flow noisily, the great flow silent. Whatever's not full makes noise. Whatever is full is quiet.","originalLang":"en","tags":["Wisdom","Character"]},{"content":"May all beings have happy minds.","original":"May all beings have happy minds.","originalLang":"en","tags":["Wisdom","Happiness"]},{"content":"One is not called noble who harms living beings. By not harming living beings one is called noble.","original":"One is not called noble who harms living beings. By not harming living beings one is called noble.","originalLang":"en","tags":["Wisdom","Virtue"]},{"content":"Radiate boundless love towards the entire world — above, below, and across — unhindered, without ill will, without enmity.","original":"Radiate boundless love towards the entire world — above, below, and across — unhindered, without ill will, without enmity.","originalLang":"en","tags":["Wisdom","Love"]},{"content":"Resolutely train yourself to attain peace.","original":"Resolutely train yourself to attain peace.","originalLang":"en","tags":["Wisdom","Self Help"]},{"content":"Should a person do good, let him do it again and again. Let him find pleasure therein, for blissful is the accumulation of good.","original":"Should a person do good, let him do it again and again. Let him find pleasure therein, for blissful is the accumulation of good.","originalLang":"en","tags":["Wisdom","Character"]},{"content":"Some do not understand that we must die, But those who do realize this settle their quarrels.","original":"Some do not understand that we must die, But those who do realize this settle their quarrels.","originalLang":"en","tags":["Wisdom","Life"]},{"content":"The calmed say that what is well-spoken is best; second, that one should say what is right, not unrighteous; third, what's pleasing, not displeasing; fourth, what is true, not false.","original":"The calmed say that what is well-spoken is best; second, that one should say what is right, not unrighteous; third, what's pleasing, not displeasing; fourth, what is true, not false.","originalLang":"en","tags":["Wisdom","Truth"]},{"content":"The root of suffering is attachment.","original":"The root of suffering is attachment.","originalLang":"en","tags":["Wisdom","Happiness"]},{"content":"The world is afflicted by death and decay. But the wise do not grieve, having realized the nature of the world.","original":"The world is afflicted by death and decay. But the wise do not grieve, having realized the nature of the world.","originalLang":"en","tags":["Wisdom","Philosophy"]},{"content":"They blame those who remain silent, they blame those who speak much, they blame those who speak in moderation. There is none in the world who is not blamed.","original":"They blame those who remain silent, they blame those who speak much, they blame those who speak in moderation. There is none in the world who is not blamed.","originalLang":"en","tags":["Wisdom"]},{"content":"Those who cling to perceptions and views wander the world offending people.","original":"Those who cling to perceptions and views wander the world offending people.","originalLang":"en","tags":["Wisdom"]},{"content":"We will develop and cultivate the liberation of mind by lovingkindness, make it our vehicle, make it our basis, stabilize it, exercise ourselves in it, and fully perfect it.","original":"We will develop and cultivate the liberation of mind by lovingkindness, make it our vehicle, make it our basis, stabilize it, exercise ourselves in it, and fully perfect it.","originalLang":"en","tags":["Wisdom","Love"]},{"content":"When watching after yourself, you watch after others. When watching after others, you watch after yourself.","original":"When watching after yourself, you watch after others. When watching after others, you watch after yourself.","originalLang":"en","tags":["Wisdom"]},{"content":"Whoever doesn't flare up at someone who's angry wins a battle hard to win.","original":"Whoever doesn't flare up at someone who's angry wins a battle hard to win.","originalLang":"en","tags":["Wisdom","Character"]},{"content":"You yourself must strive. The Buddhas only point the way.","original":"You yourself must strive. The Buddhas only point the way.","originalLang":"en","tags":["Wisdom","Motivational"]}]}};
