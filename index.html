<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太阳底下无新事</title>
<style>
:root {
  --bg: #0a0a14;
  --gold: rgba(210,185,140,1);
  --gold-dim: rgba(210,185,140,0.6);
  --gold-subtle: rgba(210,185,140,0.16);
  --gold-glow: rgba(210,185,140,0.1);
  --text: #e0d8c8;
  --text-dim: rgba(210,185,140,0.55);
  --text-hint: rgba(255,255,255,0.28);
  --border: rgba(255,255,255,0.12);
  --border-focus: rgba(210,185,140,0.35);
  --font: 'Georgia','Noto Serif SC','SimSun',serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg); color:var(--text); font-family:var(--font);
  min-height:100vh; overflow-x:hidden;
}
body::before{
  content:''; position:fixed; inset:0;
  background:radial-gradient(ellipse at 50% 40%,#1a1a30 0%,#0a0a14 60%);
  pointer-events:none; z-index:0;
}
.hidden{display:none!important}
.fade-in{animation:fadeIn .6s ease-out forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ===== ORB ===== */
#orb{width:180px;height:180px;border-radius:50%;background:radial-gradient(circle at 40% 35%,var(--gold-subtle) 0%,rgba(200,170,120,.03) 40%,transparent 70%);position:relative;margin:0 auto;animation:breathe 4s ease-in-out infinite}
#orb::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(200,170,120,.2) 0%,transparent 60%);animation:pulse 3s ease-in-out infinite}
#orb::after{content:'';position:absolute;top:-30px;left:-30px;right:-30px;bottom:-30px;border-radius:50%;border:1px solid rgba(200,170,120,.06);animation:halo 5s linear infinite}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.08);opacity:1}}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}50%{transform:translate(-50%,-50%) scale(1.3);opacity:.8}}
@keyframes halo{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* ===== LAYOUT ===== */
#app{position:relative;z-index:1}
.page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px}
.sect-title{font-size:14px;letter-spacing:6px;color:var(--text-dim);margin-bottom:32px;text-align:center}

/* ===== INITIAL ===== */
#initial-state #orb{margin-bottom:40px}
#daily-quote{text-align:center;margin-bottom:28px;max-width:460px}
#daily-quote .qt-zh{font-size:15px;color:rgba(210,190,160,.5);font-style:italic;line-height:1.8}
#daily-quote .qt-orig{font-size:11px;color:rgba(210,190,160,.28);font-style:italic;line-height:1.6;margin-top:4px}
#daily-quote .qt-auth{font-size:12px;color:rgba(210,190,160,.3);margin-top:8px}
#input-wrap{position:relative;width:420px;max-width:90vw}
#confusion-input{width:100%;padding:18px 24px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;font-family:var(--font);outline:none;transition:all .4s}
#confusion-input:focus{border-color:var(--border-focus);background:rgba(255,255,255,.08);box-shadow:0 0 40px var(--gold-glow)}
#confusion-input::placeholder{color:var(--text-hint);font-style:italic}
#input-hint{margin-top:14px;font-size:12px;color:var(--text-hint);text-align:center}

/* ===== LOADING ===== */
#loading-orb{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,rgba(200,170,120,.15) 0%,transparent 70%);animation:loadBreathe 1.5s ease-in-out infinite;margin-bottom:32px}
@keyframes loadBreathe{0%,100%{transform:scale(.8);opacity:.3}50%{transform:scale(1.3);opacity:.8}}
#loading-text{font-size:13px;color:var(--text-dim);animation:loadPulse 2s ease-in-out infinite}
@keyframes loadPulse{0%,100%{opacity:.3}50%{opacity:.7}}

/* ===== RESPONSE CARD ===== */
#response-card{max-width:560px;width:100%}
.rsp-thinker{text-align:center;margin-bottom:28px}
.rsp-thinker .rsp-name{font-size:20px;color:var(--gold-dim);letter-spacing:2px}
.rsp-thinker .rsp-meta{font-size:11px;color:var(--text-dim);margin-top:4px}
.rsp-quote{text-align:center;padding:24px 0;margin-bottom:28px;border-top:1px solid rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.05)}
.rsp-quote .qt-zh{font-size:17px;font-style:italic;line-height:1.8;color:var(--text);margin-bottom:6px}
.rsp-quote .qt-orig{font-size:13px;font-style:italic;line-height:1.6;color:rgba(200,180,150,.22)}
.rsp-section{margin-bottom:24px}
.rsp-section h3{font-size:12px;letter-spacing:4px;color:var(--gold-dim);margin-bottom:10px;font-weight:normal}
.rsp-section p{font-size:14px;line-height:1.9;color:#b0a898}
.action-row{display:flex;gap:16px;justify-content:center;margin-top:36px;flex-wrap:wrap}
.btn{
  padding:10px 28px;background:transparent;border:1px solid var(--border);
  border-radius:20px;color:var(--text-dim);font-family:var(--font);font-size:13px;
  cursor:pointer;transition:all .3s;
}
.btn:hover{border-color:rgba(200,170,120,.3);color:var(--gold-dim)}
.btn-primary{background:rgba(200,170,120,.08);border-color:rgba(200,170,120,.2);color:var(--gold-dim)}
.btn-primary:hover{background:rgba(200,170,120,.15);border-color:rgba(200,170,120,.4);color:var(--gold)}
.btn-mini{padding:8px 18px;font-size:12px}

/* ===== CHAT ===== */
#chat-state{flex-direction:column;align-items:stretch;min-height:100vh;padding:0}
.chat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.05);
  position:sticky;top:0;z-index:10;background:rgba(5,5,8,.92);
  backdrop-filter:blur(10px);
}
.chat-header .ch-name{font-size:15px;color:var(--gold-dim);letter-spacing:2px}
.chat-header .ch-back{font-size:12px;color:var(--text-dim);cursor:pointer;background:none;border:none;font-family:var(--font);transition:color .3s}
.chat-header .ch-back:hover{color:var(--gold)}
.chat-body{flex:1;overflow-y:auto;padding:20px 16px 100px;display:flex;flex-direction:column;gap:16px;max-width:640px;width:100%;margin:0 auto}
.chat-bubble{max-width:82%;padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.7;animation:fadeIn .3s ease-out}
.chat-bubble.thinker{align-self:flex-start;background:rgba(210,185,140,.1);border:1px solid rgba(210,185,140,.15);border-bottom-left-radius:4px;color:#d8d0c0}
.chat-bubble.user{align-self:flex-end;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-bottom-right-radius:4px;color:#c0c0c0}
.chat-input-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:640px;padding:12px 16px 20px;
  background:linear-gradient(0deg,rgba(5,5,8,.95) 60%,transparent 100%);
  display:flex;gap:10px;z-index:10;
}
.chat-input-bar input{
  flex:1;padding:14px 18px;background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:24px;color:var(--text);
  font-size:14px;font-family:var(--font);outline:none;transition:all .3s;
}
.chat-input-bar input:focus{border-color:var(--border-focus);background:rgba(255,255,255,.06)}
.chat-input-bar input::placeholder{color:var(--text-hint)}
.chat-input-bar button{
  padding:10px 20px;background:rgba(200,170,120,.08);border:1px solid rgba(200,170,120,.15);
  border-radius:24px;color:var(--gold-dim);font-family:var(--font);font-size:13px;
  cursor:pointer;transition:all .3s;white-space:nowrap;
}
.chat-input-bar button:hover{background:rgba(200,170,120,.15);color:var(--gold)}
.chat-typing{align-self:flex-start;padding:12px 18px;color:var(--text-dim);font-size:13px;font-style:italic}
.chat-token{align-self:flex-end;font-size:10px;color:rgba(255,255,255,.18);padding:4px 8px;margin-top:4px}

/* ===== KEY SETUP ===== */
#key-setup-content{text-align:center;max-width:360px;padding:40px}
#key-setup-content h2{font-size:18px;color:var(--text);font-weight:normal;margin-bottom:12px}
#key-setup-content p{font-size:12px;color:var(--text-dim);margin-bottom:24px;line-height:1.6}
#key-setup-content a{color:var(--gold-dim)}
#api-key-input{width:100%;padding:14px 18px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:all .3s;margin-bottom:16px}
#api-key-input:focus{border-color:var(--border-focus);box-shadow:0 0 30px var(--gold-glow)}
#save-key{padding:10px 32px;background:rgba(200,170,120,.08);border:1px solid rgba(200,170,120,.2);border-radius:8px;color:var(--gold-dim);font-family:var(--font);font-size:14px;cursor:pointer;transition:all .3s}
#save-key:hover{background:rgba(200,170,120,.15);border-color:rgba(200,170,120,.4);color:var(--gold)}

/* ===== FOOTER ===== */
footer{position:fixed;bottom:16px;right:24px;z-index:10;display:flex;gap:20px;align-items:center}
footer a{font-size:11px;color:rgba(255,255,255,.22);text-decoration:none;transition:color .3s}
footer a:hover{color:rgba(255,255,255,.4)}

/* ===== ERROR ===== */
.error-state{text-align:center;color:var(--text-dim);padding:40px}
.error-state p{margin-bottom:16px}
.error-state button{padding:8px 24px;background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--text-dim);font-family:var(--font);cursor:pointer}
.error-state button:hover{border-color:var(--gold-dim);color:var(--gold-dim)}

/* ===== PARTICLE ===== */
.particle{position:fixed;border-radius:50%;pointer-events:none;z-index:0;animation:floatUp 6s ease-in infinite}
@keyframes floatUp{0%{transform:translateY(0) scale(0);opacity:0}20%{opacity:.6}80%{opacity:.1}100%{transform:translateY(-60vh) scale(1.5);opacity:0}}

@media(max-width:600px){
  #orb{width:130px;height:130px}
  #orb::before{width:56px;height:56px}
  #orb::after{top:-20px;left:-20px;right:-20px;bottom:-20px}
  .sect-title{font-size:11px;letter-spacing:4px}
  #daily-quote .qt-zh{font-size:13px}
  #confusion-input{font-size:14px;padding:16px 20px}
  .rsp-quote .qt-zh{font-size:15px}
  .chat-bubble{max-width:90%}
}
</style>
</head>
<body>

<div id="particles"></div>
<div id="app">

  <!-- ===== INITIAL ===== -->
  <div id="initial-state" class="page">
    <div id="orb"></div>
    <div class="sect-title">太 阳 底 下 无 新 事</div>
    <div id="daily-quote"></div>
    <div id="input-wrap">
      <input id="confusion-input" type="text" placeholder="输入你的困惑..." autofocus>
      <div id="input-hint">按下回车，思想之门将为你打开</div>
    </div>
  </div>

  <!-- ===== LOADING ===== -->
  <div id="loading-state" class="page hidden">
    <div id="loading-orb"></div>
    <p id="loading-text">正在聆听你的困惑...</p>
  </div>

  <!-- ===== RESPONSE ===== -->
  <div id="response-state" class="page hidden">
    <div id="response-card"></div>
    <div class="action-row">
      <button id="continue-chat" class="btn btn-primary">继续对话 · 深入探讨</button>
      <button id="switch-thinker" class="btn">换一位思想家</button>
    </div>
    <span class="token-spot" style="font-size:10px;color:rgba(255,255,255,.18);margin-top:16px"></span>
    <button id="back-btn" class="btn btn-mini" style="margin-top:12px">回到星云</button>
  </div>

  <!-- ===== CHAT ===== -->
  <div id="chat-state" class="page hidden">
    <div class="chat-header">
      <span class="ch-name"></span>
      <button class="ch-back" id="chat-back">← 返回星云</button>
    </div>
    <div class="chat-body" id="chat-body">
      <div id="chat-token" class="chat-token"></div>
    </div>
    <div class="chat-input-bar">
      <input id="chat-input" type="text" placeholder="继续追问...">
      <button id="chat-send">发送</button>
    </div>
  </div>

  <!-- ===== KEY SETUP ===== -->
  <div id="key-setup" class="page hidden">
    <div id="key-setup-content">
      <h2>设置 DeepSeek API Key</h2>
      <p>你的 Key 仅存储在本地浏览器中，只会发送到 api.deepseek.com。<br>前往 <a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a> 获取。</p>
      <input id="api-key-input" type="password" placeholder="sk-...">
      <button id="save-key">保存</button>
      <p id="key-error" style="color:#c06050;font-size:12px;margin-top:12px;display:none"></p>
    </div>
  </div>

</div>

<footer>
  <a href="#" id="change-key-link">更换 API Key</a>
</footer>

<script src="quotes-data.js"></script>
<script>
// ===== STATE =====
const STORAGE_KEY = 'pw-api-key';
let currentConfusion = '';
let currentThinker = null;
let excludedThinkers = [];
let chatHistory = [];
let tokenTotal = 0;

function addTokens(usage){
  tokenTotal += usage.total_tokens || 0;
  updateTokenDisplay();
}
function updateTokenDisplay(){
  const cost = (tokenTotal / 1000000 * 1).toFixed(4);
  const text = `${tokenTotal.toLocaleString()} tokens · ¥${cost}`;
  // Update all token displays
  document.querySelectorAll('.token-spot').forEach(el => {
    el.textContent = text;
  });
  const chatEl = document.getElementById('chat-token');
  if(chatEl && tokenTotal > 0) chatEl.textContent = text;
}

// ===== PARTICLES =====
function createParticles(){
  const c=document.getElementById('particles');
  for(let i=0;i<6;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.cssText=`left:${10+Math.random()*80}%;bottom:${Math.random()*30}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;background:rgba(200,170,120,0.4);animation-delay:${Math.random()*3}s;animation-duration:${4+Math.random()*5}s`;
    c.appendChild(p);
  }
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ===== DAILY QUOTE =====
function getDailyQuote(){
  const all=[];
  for(const[k,a]of Object.entries(PHILOSOPHERS)){
    for(const q of a.quotes){
      const hasChinese = q.originalLang==='zh' || (q.original && q.original!==q.content);
      if(!hasChinese) continue;
      all.push({content:q.content,original:q.original||'',originalLang:q.originalLang||'en',author:a.name});
    }
  }
  const now=new Date();
  const ds=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  let h=0;for(let i=0;i<ds.length;i++)h=((h<<5)-h+ds.charCodeAt(i))|0;
  return all[Math.abs(h)%all.length];
}
function renderDailyQuote(){
  const q=getDailyQuote();
  const c=document.getElementById('daily-quote');
  const so=q.originalLang!=='zh'&&q.original&&q.original!==q.content;
  c.innerHTML=`<p class="qt-zh">"${esc(q.content)}"</p>${so?`<p class="qt-orig">${esc(q.original)}</p>`:''}<p class="qt-auth">—— ${esc(q.author)}</p>`;
}

// ===== API KEY =====
function getApiKey(){return localStorage.getItem(STORAGE_KEY)}
function saveApiKey(k){localStorage.setItem(STORAGE_KEY,k.trim())}
function showKeySetup(){
  hideAll();document.getElementById('key-setup').classList.remove('hidden');
  document.getElementById('api-key-input').focus();
}
function hideKeySetup(){
  document.getElementById('key-setup').classList.add('hidden');
  document.getElementById('initial-state').classList.remove('hidden');
  document.getElementById('confusion-input').focus();
}
function checkApiKey(){if(!getApiKey()){showKeySetup();return false}return true}
function hideAll(){
  ['initial-state','loading-state','response-state','chat-state','key-setup'].forEach(id=>{
    document.getElementById(id).classList.add('hidden');
  });
}

// ===== SYSTEM PROMPT (D-Mode) =====
function buildSystemPrompt(){
  const profiles=Object.entries(PHILOSOPHERS).map(([k,a])=>{
    const sq=a.quotes.slice(0,5).map(q=>`"${q.content}"`).join(' | ');
    return `### ${a.name}（${a.nameEn}，${a.era}，${a.school}）
母语：${a.originalLang==='de'?'德语':a.originalLang==='fr'?'法语':a.originalLang==='la'?'拉丁语':a.originalLang==='grc'?'古希腊语':a.originalLang==='pi'?'巴利语':'中文'}
核心思想：${a.core}。话语风格：${a.style}。代表语录：${sq}`;
  }).join('\n\n');

  return `你是思想图书馆的守护者。任务：
1. 分析困惑的哲学本质——找到底层的存在困境
2. 从18位思想家中选择最能刺穿这个问题的1位
3. 给出该思想家的真实语录（中文+母语原文）
4. 按两步结构回应：诊断→转念

${profiles}

返回格式（纯JSON，不要其他文字）：
{
  "thinker": {"key": "英文key", "name": "中文名", "era": "年代", "school": "学派"},
  "quote": "中文译文",
  "quoteOriginal": "母语原文（必须真实！德语/法语/拉丁语/古希腊语/巴利语/中文）",
  "quoteLang": "de/fr/la/grc/zh/pi",
  "诊断": "锋利的诊断（150字内）。不要安慰，像镜子让用户看见自己不愿承认的东西。",
  "转念": "框架颠覆（180字内）。用核心哲学概念重新框定问题。让用户产生'原来可以这样看'的豁然感。"
}

铁律：不要鸡汤、不要安慰、不要共情。要锋利、诚实、有哲学深度。要直指人心，一针见血。`;
}

// ===== SYSTEM PROMPT (Chat Mode) =====
function buildChatSystemPrompt(thinkerKey){
  const a = PHILOSOPHERS[thinkerKey];
  const langName = a.originalLang==='de'?'德语':a.originalLang==='fr'?'法语':a.originalLang==='la'?'拉丁语':a.originalLang==='grc'?'古希腊语':a.originalLang==='pi'?'巴利语':'中文';
  const sq=a.quotes.slice(0,8).map(q=>`"${q.content}"`).join(' | ');

  return `你正在以${a.name}（${a.nameEn}，${a.era}）的身份对话。你的学派是${a.school}。核心思想：${a.core}。

你的话语风格：${a.style}
你的母语是：${langName}

你掌握的真实语录包括：${sq}

规则：
- 用${a.name}的口吻和概念体系来回应，但不要刻意模仿古语
- 回应用现代中文，自然流畅
- 适当引用你自己的真实名言或核心概念来佐证观点
- 保持哲学的锋利和诚实——不要变成心灵鸡汤
- 可以追问用户，引导他们更深入地思考
- 回复长度控制在200字以内，像真实对话一样简洁
- 当你引用自己的名言时，在括号内给出原文（${langName}）`;
}

// ===== API CALLS =====
async function callDeepSeek(messages, retries=2){
  const apiKey=getApiKey();
  if(!apiKey){showKeySetup();throw new Error('API key not set')}

  for(let i=0;i<=retries;i++){
    const resp=await fetch('https://api.deepseek.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body:JSON.stringify({
        model:'deepseek-chat',max_tokens:1200,temperature:0.7,messages
      })
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      if(i===retries) throw new Error(err.error?.message||`API error: ${resp.status}`);
      await new Promise(r=>setTimeout(r,2000*(i+1)));
      continue;
    }
    const data=await resp.json();
    return {
      text: data.choices[0].message.content,
      usage: data.usage || { prompt_tokens: 0, completion_tokens: 0, total_tokens: 0 }
    };
  }
}

function parseJSON(text){
  let t=text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
  try{return JSON.parse(t)}
  catch(e){
    const m=t.match(/\{[\s\S]*\}/);
    if(m) return JSON.parse(m[0]);
    throw new Error('JSON parse failed: '+t.substring(0,200));
  }
}

// ===== D-MODE FLOW =====
async function handleSubmit(){
  const input=document.getElementById('confusion-input');
  const confusion=input.value.trim();
  if(!confusion) return;
  if(!checkApiKey()) return;

  currentConfusion=confusion;
  excludedThinkers=[];
  input.value='';

  hideAll();
  document.getElementById('loading-state').classList.remove('hidden');
  const iv=startLoadingAnim();

  try{
    const resp=await callDeepSeek([
      {role:'system',content:buildSystemPrompt()},
      {role:'user',content:confusion}
    ]);
    addTokens(resp.usage);
    const result=parseJSON(resp.text);
    clearInterval(iv);
    document.getElementById('loading-text').textContent=`已豁然——${result.thinker.name}回应`;
    await new Promise(r=>setTimeout(r,800));

    currentThinker=result.thinker.key;
    excludedThinkers.push(result.thinker.key);
    renderResponse(result);
    hideAll();
    document.getElementById('response-state').classList.remove('hidden');
  }catch(err){
    clearInterval(iv);
    console.error(err);
    document.getElementById('response-card').innerHTML=`
      <div class="error-state"><p>思虑未通，请稍后再试。</p>
      <p style="font-size:12px;color:rgba(255,255,255,.2)">${esc(err.message)}</p>
      <button onclick="showInitial()">返回重试</button></div>`;
    hideAll();document.getElementById('response-state').classList.remove('hidden');
  }
}

function renderResponse(data){
  const card=document.getElementById('response-card');
  const so=data.quoteOriginal&&data.quoteLang!=='zh'&&data.quoteOriginal!==data.quote;
  card.innerHTML=`
    <div class="rsp-thinker"><div class="rsp-name">${esc(data.thinker.name)} 对你这样说</div><div class="rsp-meta">${esc(data.thinker.era)} · ${esc(data.thinker.school)}</div></div>
    <div class="rsp-quote"><p class="qt-zh">"${esc(data.quote)}"</p>${so?`<p class="qt-orig">${esc(data.quoteOriginal)}</p>`:''}</div>
    <div class="rsp-section"><h3>诊断</h3><p>${esc(data.诊断||'')}</p></div>
    <div class="rsp-section"><h3>转念</h3><p>${esc(data.转念||'')}</p></div>`;
  card.style.animation='none';card.offsetHeight;
  card.style.animation='fadeIn .6s ease-out forwards';
  currentThinker=data.thinker.key;
}

async function handleSwitchThinker(){
  if(!currentConfusion) return;
  hideAll();document.getElementById('loading-state').classList.remove('hidden');
  const iv=startLoadingAnim();
  try{
    const resp2=await callDeepSeek([
      {role:'system',content:buildSystemPrompt()+'\n\n注意：用户已看过以下思想家的回应，请选其他：'+excludedThinkers.join('、')},
      {role:'user',content:currentConfusion}
    ]);
    addTokens(resp2.usage);
    const result=parseJSON(resp2.text);
    clearInterval(iv);
    document.getElementById('loading-text').textContent=`已豁然——${result.thinker.name}回应`;
    await new Promise(r=>setTimeout(r,600));
    excludedThinkers.push(result.thinker.key);
    currentThinker=result.thinker.key;
    renderResponse(result);
    hideAll();document.getElementById('response-state').classList.remove('hidden');
  }catch(err){
    clearInterval(iv);
    alert('暂无其他思想家回应。\n\n'+err.message);
    hideAll();document.getElementById('response-state').classList.remove('hidden');
  }
}

function showInitial(){
  hideAll();
  document.getElementById('initial-state').classList.remove('hidden');
  document.getElementById('confusion-input').focus();
  document.getElementById('particles').style.display='';
  renderDailyQuote();
}

// ===== CHAT MODE =====
function startChat(){
  if(!currentThinker) return;
  chatHistory=[];
  const a=PHILOSOPHERS[currentThinker];

  // Set header
  document.querySelector('.ch-name').textContent=`与 ${a.name} 对话`;

  // Show the D-mode diagnosis as first thinker message
  const card=document.getElementById('response-card');
  const quoteEl=card.querySelector('.rsp-quote .qt-zh');
  const diagEl=card.querySelector('.rsp-section:nth-child(3) p'); // 诊断

  let firstMsg='';
  if(quoteEl) firstMsg+=`"${quoteEl.textContent.replace(/^"|"$/g,'')}"\n\n`;
  if(diagEl) firstMsg+=diagEl.textContent;
  if(!firstMsg) firstMsg='让我们继续深入刚才的话题。';

  const body=document.getElementById('chat-body');
  body.innerHTML='<div id=\"chat-token\" class=\"chat-token\"></div>';
  updateTokenDisplay();
  appendBubble('thinker',firstMsg);
  chatHistory.push({role:'assistant',content:firstMsg});

  hideAll();
  document.getElementById('chat-state').classList.remove('hidden');
  document.getElementById('chat-input').focus();
}

function appendBubble(type,text){
  const body=document.getElementById('chat-body');
  const div=document.createElement('div');
  div.className=`chat-bubble ${type}`;
  div.textContent=text;
  body.appendChild(div);
  body.scrollTop=body.scrollHeight;
}

function appendTyping(){
  const body=document.getElementById('chat-body');
  const div=document.createElement('div');
  div.className='chat-typing';
  div.textContent='正在思考...';
  div.id='typing-indicator';
  body.appendChild(div);
  body.scrollTop=body.scrollHeight;
}

function removeTyping(){
  const el=document.getElementById('typing-indicator');
  if(el) el.remove();
}

async function sendChatMessage(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();
  if(!msg) return;
  if(!currentThinker) return;

  input.value='';
  appendBubble('user',msg);
  chatHistory.push({role:'user',content:msg});
  appendTyping();

  try{
    const resp3=await callDeepSeek([
      {role:'system',content:buildChatSystemPrompt(currentThinker)},
      ...chatHistory
    ]);
    addTokens(resp3.usage);
    removeTyping();
    appendBubble('thinker',resp3.text);
    chatHistory.push({role:'assistant',content:resp3.text});
  }catch(err){
    removeTyping();
    appendBubble('thinker','（思考中断，请稍后再问。）');
  }
}

// ===== LOADING ANIM =====
const LOADING_PHRASES=['正在聆听你的困惑...','在人类思想的星河中寻找...','一位智者正在沉思...','真理正在浮现...'];
function startLoadingAnim(){
  const el=document.getElementById('loading-text');
  el.textContent=LOADING_PHRASES[0];
  let i=0;
  return setInterval(()=>{i++;if(i<LOADING_PHRASES.length)el.textContent=LOADING_PHRASES[i]},2000);
}

// ===== EVENT BINDINGS =====
document.getElementById('confusion-input').addEventListener('keydown',e=>{if(e.key==='Enter')handleSubmit()});
document.getElementById('switch-thinker').addEventListener('click',handleSwitchThinker);
document.getElementById('back-btn').addEventListener('click',showInitial);
document.getElementById('continue-chat').addEventListener('click',startChat);
document.getElementById('chat-send').addEventListener('click',sendChatMessage);
document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendChatMessage()});
document.getElementById('chat-back').addEventListener('click',showInitial);
document.getElementById('save-key').addEventListener('click',()=>{
  const input=document.getElementById('api-key-input');
  const key=input.value.trim();
  if(!key.startsWith('sk-')){document.getElementById('key-error').textContent='Key 格式应为 sk- 开头';document.getElementById('key-error').style.display='block';return}
  document.getElementById('key-error').style.display='none';saveApiKey(key);hideKeySetup();
});
document.getElementById('api-key-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('save-key').click()});
document.getElementById('change-key-link').addEventListener('click',e=>{e.preventDefault();showKeySetup()});

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>{
  createParticles();renderDailyQuote();checkApiKey();
  const now=new Date();
  const msNext=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1).getTime()-now.getTime();
  setTimeout(()=>{renderDailyQuote();setInterval(renderDailyQuote,86400000)},msNext+1000);
});
</script>
</body>
