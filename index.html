<script>
// ===== STATE =====
const STORAGE_KEY = 'pw-api-key';
let currentConfusion = '';
let currentThinker = null;
let excludedThinkers = [];
let chatHistory = [];
let tokenTotal = 0;
let currentUser = null;

// ===== AMBIENT MUSIC =====
let audioCtx=null, musicOn=true, currentNodes=[];
const MOODS={
  '存在主义':{freq:[55,82.5,110],type:'sawtooth',gain:0.04,lfo:0.08,desc:'深邃暗涌'},
  '辩证/历史':{freq:[65,98,130],type:'triangle',gain:0.05,lfo:0.12,desc:'低沉稳进'},
  '斯多葛':{freq:[87,130,174],type:'sine',gain:0.04,lfo:0.06,desc:'沉静内省'},
  '东方智慧':{freq:[98,147,196],type:'sine',gain:0.03,lfo:0.04,desc:'空灵悠远'},
  '理性主义':{freq:[73,110,146],type:'triangle',gain:0.04,lfo:0.07,desc:'严谨和声'},
  '超越视角':{freq:[65,130,261],type:'sine',gain:0.03,lfo:0.03,desc:'纯净冥想'}
};

function getMood(school){
  for(const[k,v]of Object.entries(MOODS)){if(school&&school.includes(k))return v}
  return MOODS['存在主义'];
}

function stopAmbient(){
  currentNodes.forEach(n=>{try{n.gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.8);n.osc.stop(audioCtx.currentTime+1)}catch(e){}});
  currentNodes=[];
}

async function playAmbient(school){
  if(!musicOn)return;
  stopAmbient();
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){return}}
  if(audioCtx.state==='suspended')await audioCtx.resume();
  const mood=getMood(school);
  const now=audioCtx.currentTime;

  mood.freq.forEach((f,i)=>{
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    const lfo=audioCtx.createOscillator();
    const lfoGain=audioCtx.createGain();

    osc.type=mood.type; osc.frequency.value=f;
    lfo.type='sine'; lfo.frequency.value=mood.lfo;
    lfoGain.gain.value=f*0.03;

    gain.gain.setValueAtTime(0,now);
    gain.gain.linearRampToValueAtTime(mood.gain*(1-i*0.25),now+1.5);

    lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
    osc.connect(gain); gain.connect(audioCtx.destination);

    osc.start(now); lfo.start(now);
    currentNodes.push({osc,gain,lfo});
  });
}

function toggleMusic(){
  musicOn=!musicOn;
  const btn=document.getElementById('music-btn');
  if(musicOn){btn.classList.add('on');btn.textContent='♪';if(currentThinker)playAmbient(PHILOSOPHERS[currentThinker]?.school)}
  else{btn.classList.remove('on');btn.textContent='♪';stopAmbient()}
}

// ===== AUTH =====
async function hashPassword(pw){const e=new TextEncoder();const d=await crypto.subtle.digest('SHA-256',e.encode(pw));return Array.from(new Uint8Array(d)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function getAccounts(){try{return JSON.parse(localStorage.getItem('pw-accounts')||'{}')}catch(e){return{}}}
function saveAccounts(accts){localStorage.setItem('pw-accounts',JSON.stringify(accts))}

async function doLogin(){
  const u=document.getElementById('login-username').value.trim();
  const p=document.getElementById('login-password').value.trim();
  const msg=document.getElementById('login-msg');
  if(!u||!p){msg.textContent='请填写用户名和密码';msg.style.display='block';return}
  const accts=getAccounts();
  const hash=await hashPassword(p);
  if(!accts[u]){msg.textContent='用户不存在，请先注册';msg.style.display='block';return}
  if(accts[u]!==hash){msg.textContent='密码错误';msg.style.display='block';return}
  currentUser=u;
  msg.style.display='none';
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('initial-state').classList.remove('hidden');
  document.getElementById('confusion-input').focus();
  renderHistoryBadge();
  updateKeyIndicator();
}

async function doRegister(){
  const u=document.getElementById('login-username').value.trim();
  const p=document.getElementById('login-password').value.trim();
  const msg=document.getElementById('login-msg');
  if(!u||!p){msg.textContent='请填写用户名和密码';msg.style.display='block';return}
  if(p.length<3){msg.textContent='密码至少3位';msg.style.display='block';return}
  const accts=getAccounts();
  if(accts[u]){msg.textContent='用户已存在，请直接登录';msg.style.display='block';return}
  accts[u]=await hashPassword(p);
  saveAccounts(accts);
  document.getElementById('login-title').textContent='注册成功，请登录';
  document.getElementById('login-password').value='';
  document.getElementById('login-msg').style.display='none';
}

// ===== HISTORY =====
function getHistory(){try{return JSON.parse(localStorage.getItem('pw-history-'+currentUser)||'[]')}catch(e){return[]}}
function saveHistory(entry){
  if(!currentUser) return;
  const h=getHistory();
  h.unshift({...entry,date:new Date().toISOString()});
  if(h.length>100) h.length=100;
  localStorage.setItem('pw-history-'+currentUser,JSON.stringify(h));
  renderHistoryBadge();
}

function renderHistoryBadge(){
  const h=getHistory();
  const btn=document.getElementById('history-btn');
  if(btn) btn.textContent=h.length>0?`历史记录 (${h.length})`:'历史记录';
}

function openHistory(){
  const panel=document.getElementById('history-panel');
  const overlay=document.getElementById('history-overlay');
  const list=document.getElementById('history-list');
  const h=getHistory();
  if(h.length===0){list.innerHTML='<div class="history-empty">尚无记录<br><br>输入困惑后会出现在这里</div>'}
  else{
    list.innerHTML=h.map((e,i)=>`
      <div class="history-item" onclick="replayHistory(${i})">
        <div class="hi-date">${new Date(e.date).toLocaleString('zh-CN')}</div>
        <div class="hi-confusion">${esc(e.confusion)}</div>
        <div class="hi-thinker">${esc(e.thinker||'')}</div>
      </div>`).join('');
  }
  panel.classList.add('open');
  overlay.classList.add('show');
}

function closeHistory(){
  document.getElementById('history-panel').classList.remove('open');
  document.getElementById('history-overlay').classList.remove('show');
}

function replayHistory(i){
  const h=getHistory();
  const e=h[i];
  if(!e) return;
  closeHistory();
  currentConfusion=e.confusion;
  currentThinker=e.thinkerKey||null;
  excludedThinkers=[];

  // Show a simplified response card from history
  document.getElementById('response-card').innerHTML=`
    <div class="rsp-thinker"><div class="rsp-name">${esc(e.thinker||'')} 曾对你这样说</div><div class="rsp-meta">${esc(e.date?new Date(e.date).toLocaleString('zh-CN'):'')}</div></div>
    <div class="rsp-quote"><p class="qt-zh">"${esc(e.quote||'')}"</p></div>
    <div class="rsp-section"><h3>诊断</h3><p>${esc(e.诊断||'')}</p></div>
    <div class="rsp-section"><h3>转念</h3><p>${esc(e.转念||'')}</p></div>`;
  hideAll();
  document.getElementById('response-state').classList.remove('hidden');
}

function addTokens(usage){
  tokenTotal += usage.total_tokens || 0;
  updateTokenDisplay();
}
function updateTokenDisplay(){
  const cost = (tokenTotal / 1000000 * 1).toFixed(4);
  const text = `${tokenTotal.toLocaleString()} tokens · ¥${cost}`;
  // Update all token displays
  document.querySelectorAll('.token-spot').forEach(el => {
    el.textContent = text;
  });
  const chatEl = document.getElementById('chat-token');
  if(chatEl && tokenTotal > 0) chatEl.textContent = text;
}

// ===== PARTICLES =====
function createParticles(){
  const c=document.getElementById('particles');
  for(let i=0;i<6;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.cssText=`left:${10+Math.random()*80}%;bottom:${Math.random()*30}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;background:rgba(200,170,120,0.4);animation-delay:${Math.random()*3}s;animation-duration:${4+Math.random()*5}s`;
    c.appendChild(p);
  }
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ===== DAILY QUOTE =====
function getDailyQuote(){
  const all=[];
  for(const[k,a]of Object.entries(PHILOSOPHERS)){
    for(const q of a.quotes){
      const hasChinese = q.originalLang==='zh' || (q.original && q.original!==q.content);
      if(!hasChinese) continue;
      all.push({content:q.content,original:q.original||'',originalLang:q.originalLang||'en',author:a.name});
    }
  }
  const now=new Date();
  const ds=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  let h=0;for(let i=0;i<ds.length;i++)h=((h<<5)-h+ds.charCodeAt(i))|0;
  return all[Math.abs(h)%all.length];
}
function renderDailyQuote(){
  const q=getDailyQuote();
  const c=document.getElementById('daily-quote');
  const so=q.originalLang!=='zh'&&q.original&&q.original!==q.content;
  c.innerHTML=`<p class="qt-zh">"${esc(q.content)}"</p>${so?`<p class="qt-orig">${esc(q.original)}</p>`:''}<p class="qt-auth">—— ${esc(q.author)}</p>`;
}

// ===== API KEY =====
function setCookie(name,value,days){const d=new Date();d.setTime(d.getTime()+days*86400000);document.cookie=name+'='+encodeURIComponent(value)+';expires='+d.toUTCString()+';path=/;SameSite=Lax'}
function getCookie(name){const m=document.cookie.match('(^|;)\\s*'+name+'\\s*=\\s*([^;]+)');return m?decodeURIComponent(m.pop()):null}

function getApiKey(){
  let k=localStorage.getItem(STORAGE_KEY);
  if(!k) k=getCookie(STORAGE_KEY);
  return k;
}
function saveApiKey(k){
  k=k.trim();
  localStorage.setItem(STORAGE_KEY,k);
  setCookie(STORAGE_KEY,k,365);
  updateKeyIndicator();
}
function clearApiKey(){
  localStorage.removeItem(STORAGE_KEY);
  setCookie(STORAGE_KEY,'',-1);
  updateKeyIndicator();
}
function updateKeyIndicator(){
  const el=document.getElementById('key-indicator');
  if(getApiKey()){el.textContent='⚡ Key 已就绪';el.style.color='rgba(210,185,140,.35)'}
  else{el.textContent='⚡ Key 未设置';el.style.color='rgba(255,255,255,.22)'}
}
function showKeySetup(){
  hideAll();document.getElementById('key-setup').classList.remove('hidden');
  const inp=document.getElementById('api-key-input');
  inp.value=getApiKey()||'';
  inp.focus();
}
function hideKeySetup(){
  document.getElementById('key-setup').classList.add('hidden');
  document.getElementById('initial-state').classList.remove('hidden');
  document.getElementById('confusion-input').focus();
}
function checkApiKey(){if(!getApiKey()){showKeySetup();return false}return true}
function hideAll(){
  ['initial-state','loading-state','response-state','chat-state','key-setup','login-screen'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.classList.add('hidden');
  });
}

// ===== SYSTEM PROMPT (D-Mode) =====
function buildSystemPrompt(){
  const profiles=Object.entries(PHILOSOPHERS).map(([k,a])=>{
    const sq=a.quotes.slice(0,5).map(q=>`"${q.content}"`).join(' | ');
    return `### ${a.name}（${a.nameEn}，${a.era}，${a.school}）
母语：${a.originalLang==='de'?'德语':a.originalLang==='fr'?'法语':a.originalLang==='la'?'拉丁语':a.originalLang==='grc'?'古希腊语':a.originalLang==='pi'?'巴利语':'中文'}
核心思想：${a.core}。话语风格：${a.style}。代表语录：${sq}`;
  }).join('\n\n');

  return `你是思想图书馆的守护者。任务：
1. 分析困惑的哲学本质——找到底层的存在困境
2. 从18位思想家中选择最能刺穿这个问题的1位
3. 给出该思想家的真实语录（中文+母语原文）
4. 按两步结构回应：诊断→转念

${profiles}

返回格式（纯JSON，不要其他文字）：
{
  "thinker": {"key": "英文key", "name": "中文名", "era": "年代", "school": "学派"},
  "quote": "中文译文",
  "quoteOriginal": "母语原文（必须真实！德语/法语/拉丁语/古希腊语/巴利语/中文）",
  "quoteLang": "de/fr/la/grc/zh/pi",
  "诊断": "锋利的诊断（150字内）。不要安慰，像镜子让用户看见自己不愿承认的东西。",
  "转念": "框架颠覆（180字内）。用核心哲学概念重新框定问题。让用户产生'原来可以这样看'的豁然感。"
}

铁律：不要鸡汤、不要安慰、不要共情。要锋利、诚实、有哲学深度。要直指人心，一针见血。`;
}

// ===== SYSTEM PROMPT (Chat Mode) =====
function buildChatSystemPrompt(thinkerKey){
  const a = PHILOSOPHERS[thinkerKey];
  const langName = a.originalLang==='de'?'德语':a.originalLang==='fr'?'法语':a.originalLang==='la'?'拉丁语':a.originalLang==='grc'?'古希腊语':a.originalLang==='pi'?'巴利语':'中文';
  const sq=a.quotes.slice(0,8).map(q=>`"${q.content}"`).join(' | ');

  return `你正在以${a.name}（${a.nameEn}，${a.era}）的身份对话。你的学派是${a.school}。核心思想：${a.core}。

你的话语风格：${a.style}
你的母语是：${langName}

你掌握的真实语录包括：${sq}

规则：
- 用${a.name}的口吻和概念体系来回应，但不要刻意模仿古语
- 回应用现代中文，自然流畅
- 适当引用你自己的真实名言或核心概念来佐证观点
- 保持哲学的锋利和诚实——不要变成心灵鸡汤
- 可以追问用户，引导他们更深入地思考
- 回复长度控制在200字以内，像真实对话一样简洁
- 当你引用自己的名言时，在括号内给出原文（${langName}）`;
}

// ===== API CALLS =====
async function callDeepSeek(messages, retries=2){
  const apiKey=getApiKey();
  if(!apiKey){showKeySetup();throw new Error('API key not set')}

  for(let i=0;i<=retries;i++){
    const resp=await fetch('https://api.deepseek.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body:JSON.stringify({
        model:'deepseek-chat',max_tokens:1200,temperature:0.7,messages
      })
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      if(i===retries) throw new Error(err.error?.message||`API error: ${resp.status}`);
      await new Promise(r=>setTimeout(r,2000*(i+1)));
      continue;
    }
    const data=await resp.json();
    return {
      text: data.choices[0].message.content,
      usage: data.usage || { prompt_tokens: 0, completion_tokens: 0, total_tokens: 0 }
    };
  }
}

function parseJSON(text){
  let t=text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
  try{return JSON.parse(t)}
  catch(e){
    const m=t.match(/\{[\s\S]*\}/);
    if(m) return JSON.parse(m[0]);
    throw new Error('JSON parse failed: '+t.substring(0,200));
  }
}

// ===== D-MODE FLOW =====
async function handleSubmit(){
  const input=document.getElementById('confusion-input');
  const confusion=input.value.trim();
  if(!confusion) return;
  if(!checkApiKey()) return;

  currentConfusion=confusion;
  excludedThinkers=[];
  input.value='';

  hideAll();
  document.getElementById('loading-state').classList.remove('hidden');
  const iv=startLoadingAnim();

  try{
    const resp=await callDeepSeek([
      {role:'system',content:buildSystemPrompt()},
      {role:'user',content:confusion}
    ]);
    addTokens(resp.usage);
    const result=parseJSON(resp.text);
    clearInterval(iv);
    document.getElementById('loading-text').textContent=`已豁然——${result.thinker.name}回应`;
    await new Promise(r=>setTimeout(r,800));

    currentThinker=result.thinker.key;
    excludedThinkers.push(result.thinker.key);
    renderResponse(result);
    playAmbient(result.thinker.school);
    saveHistory({confusion:currentConfusion,thinker:result.thinker.name,thinkerKey:result.thinker.key,quote:result.quote,诊断:result.诊断,转念:result.转念});
    hideAll();
    document.getElementById('response-state').classList.remove('hidden');
  }catch(err){
    clearInterval(iv);
    console.error(err);
    document.getElementById('response-card').innerHTML=`
      <div class="error-state"><p>思虑未通，请稍后再试。</p>
      <p style="font-size:12px;color:rgba(255,255,255,.2)">${esc(err.message)}</p>
      <button onclick="showInitial()">返回重试</button></div>`;
    hideAll();document.getElementById('response-state').classList.remove('hidden');
  }
}

function renderResponse(data){
  const card=document.getElementById('response-card');
  const so=data.quoteOriginal&&data.quoteLang!=='zh'&&data.quoteOriginal!==data.quote;
  card.innerHTML=`
    <div class="rsp-thinker"><div class="rsp-name">${esc(data.thinker.name)} 对你这样说</div><div class="rsp-meta">${esc(data.thinker.era)} · ${esc(data.thinker.school)}</div></div>
    <div class="rsp-quote"><p class="qt-zh">"${esc(data.quote)}"</p>${so?`<p class="qt-orig">${esc(data.quoteOriginal)}</p>`:''}</div>
    <div class="rsp-section"><h3>诊断</h3><p>${esc(data.诊断||'')}</p></div>
    <div class="rsp-section"><h3>转念</h3><p>${esc(data.转念||'')}</p></div>`;
  card.style.animation='none';card.offsetHeight;
  card.style.animation='fadeIn .6s ease-out forwards';
  currentThinker=data.thinker.key;
}

async function handleSwitchThinker(){
  if(!currentConfusion) return;
  hideAll();document.getElementById('loading-state').classList.remove('hidden');
  const iv=startLoadingAnim();
  try{
    const resp2=await callDeepSeek([
      {role:'system',content:buildSystemPrompt()+'\n\n注意：用户已看过以下思想家的回应，请选其他：'+excludedThinkers.join('、')},
      {role:'user',content:currentConfusion}
    ]);
    addTokens(resp2.usage);
    const result=parseJSON(resp2.text);
    clearInterval(iv);
    document.getElementById('loading-text').textContent=`已豁然——${result.thinker.name}回应`;
    await new Promise(r=>setTimeout(r,600));
    excludedThinkers.push(result.thinker.key);
    currentThinker=result.thinker.key;
    renderResponse(result);
    playAmbient(result.thinker.school);
    hideAll();document.getElementById('response-state').classList.remove('hidden');
  }catch(err){
    clearInterval(iv);
    alert('暂无其他思想家回应。\n\n'+err.message);
    hideAll();document.getElementById('response-state').classList.remove('hidden');
  }
}

function showInitial(){
  hideAll();
  document.getElementById('initial-state').classList.remove('hidden');
  document.getElementById('confusion-input').focus();
  document.getElementById('particles').style.display='';
  renderDailyQuote();
}

// ===== CHAT MODE =====
function startChat(){
  if(!currentThinker) return;
  chatHistory=[];
  const a=PHILOSOPHERS[currentThinker];

  // Set header
  document.querySelector('.ch-name').textContent=`与 ${a.name} 对话`;

  // Show the D-mode diagnosis as first thinker message
  const card=document.getElementById('response-card');
  const quoteEl=card.querySelector('.rsp-quote .qt-zh');
  const diagEl=card.querySelector('.rsp-section:nth-child(3) p'); // 诊断

  let firstMsg='';
  if(quoteEl) firstMsg+=`"${quoteEl.textContent.replace(/^"|"$/g,'')}"\n\n`;
  if(diagEl) firstMsg+=diagEl.textContent;
  if(!firstMsg) firstMsg='让我们继续深入刚才的话题。';

  const body=document.getElementById('chat-body');
  body.innerHTML='<div id=\"chat-token\" class=\"chat-token\"></div>';
  updateTokenDisplay();
  appendBubble('thinker',firstMsg);
  chatHistory.push({role:'assistant',content:firstMsg});

  hideAll();
  document.getElementById('chat-state').classList.remove('hidden');
  document.getElementById('chat-input').focus();
}

function appendBubble(type,text){
  const body=document.getElementById('chat-body');
  const div=document.createElement('div');
  div.className=`chat-bubble ${type}`;
  div.textContent=text;
  body.appendChild(div);
  body.scrollTop=body.scrollHeight;
}

function appendTyping(){
  const body=document.getElementById('chat-body');
  const div=document.createElement('div');
  div.className='chat-typing';
  div.textContent='正在思考...';
  div.id='typing-indicator';
  body.appendChild(div);
  body.scrollTop=body.scrollHeight;
}

function removeTyping(){
  const el=document.getElementById('typing-indicator');
  if(el) el.remove();
}

async function sendChatMessage(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();
  if(!msg) return;
  if(!currentThinker) return;

  input.value='';
  appendBubble('user',msg);
  chatHistory.push({role:'user',content:msg});
  appendTyping();

  try{
    const resp3=await callDeepSeek([
      {role:'system',content:buildChatSystemPrompt(currentThinker)},
      ...chatHistory
    ]);
    addTokens(resp3.usage);
    removeTyping();
    appendBubble('thinker',resp3.text);
    chatHistory.push({role:'assistant',content:resp3.text});
  }catch(err){
    removeTyping();
    appendBubble('thinker','（思考中断，请稍后再问。）');
  }
}

// ===== LOADING ANIM =====
const LOADING_PHRASES=['正在聆听你的困惑...','在人类思想的星河中寻找...','一位智者正在沉思...','真理正在浮现...'];
function startLoadingAnim(){
  const el=document.getElementById('loading-text');
  el.textContent=LOADING_PHRASES[0];
  let i=0;
  return setInterval(()=>{i++;if(i<LOADING_PHRASES.length)el.textContent=LOADING_PHRASES[i]},2000);
}

// ===== EVENT BINDINGS =====
document.getElementById('confusion-input').addEventListener('keydown',e=>{if(e.key==='Enter')handleSubmit()});
document.getElementById('submit-btn').addEventListener('click',handleSubmit);
document.getElementById('switch-thinker').addEventListener('click',handleSwitchThinker);
document.getElementById('back-btn').addEventListener('click',showInitial);
document.getElementById('continue-chat').addEventListener('click',startChat);
document.getElementById('chat-send').addEventListener('click',sendChatMessage);
document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendChatMessage()});
document.getElementById('chat-back').addEventListener('click',showInitial);
document.getElementById('save-key').addEventListener('click',()=>{
  const input=document.getElementById('api-key-input');
  const key=input.value.trim();
  if(!key.startsWith('sk-')){document.getElementById('key-error').textContent='Key 格式应为 sk- 开头';document.getElementById('key-error').style.display='block';return}
  document.getElementById('key-error').style.display='none';saveApiKey(key);hideKeySetup();
});
document.getElementById('clear-key').addEventListener('click',()=>{
  clearApiKey();
  document.getElementById('api-key-input').value='';
  document.getElementById('key-error').style.display='none';
});
document.getElementById('api-key-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('save-key').click()});
document.getElementById('key-indicator').addEventListener('click',e=>{e.preventDefault();showKeySetup()});

// Login bindings
document.getElementById('login-btn').addEventListener('click',doLogin);
document.getElementById('register-btn').addEventListener('click',doRegister);
document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('login-username').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-password').focus()});

document.addEventListener('DOMContentLoaded',()=>{
  createParticles();
  // Show login first
  const accts=getAccounts();
  if(Object.keys(accts).length===0){
    document.getElementById('login-title').textContent='首次使用，请注册';
  }
  document.getElementById('login-screen').classList.remove('hidden');

  renderDailyQuote(); updateKeyIndicator();
  document.getElementById('music-btn').classList.add('on');
  const now=new Date();
  const msNext=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1).getTime()-now.getTime();
  setTimeout(()=>{renderDailyQuote();setInterval(renderDailyQuote,86400000)},msNext+1000);
});
</script>
