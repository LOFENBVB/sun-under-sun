<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太阳底下无新事</title>
<style>
:root {
  --bg: #0a0a14;
  --gold: rgba(210,185,140,1);
  --gold-dim: rgba(210,185,140,0.6);
  --gold-subtle: rgba(210,185,140,0.16);
  --gold-glow: rgba(210,185,140,0.1);
  --text: #e0d8c8;
  --text-dim: rgba(210,185,140,0.55);
  --text-hint: rgba(255,255,255,0.28);
  --border: rgba(255,255,255,0.12);
  --border-focus: rgba(210,185,140,0.35);
  --font: 'Georgia','Noto Serif SC','SimSun',serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg); color:var(--text); font-family:var(--font);
  min-height:100vh; overflow-x:hidden;
}
body::before{
  content:''; position:fixed; inset:0;
  background:radial-gradient(ellipse at 50% 40%,#1a1a30 0%,#0a0a14 60%);
  pointer-events:none; z-index:0;
}
.hidden{display:none!important}
.fade-in{animation:fadeIn .6s ease-out forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ===== ORB ===== */
#orb{width:180px;height:180px;border-radius:50%;background:radial-gradient(circle at 40% 35%,var(--gold-subtle) 0%,rgba(200,170,120,.03) 40%,transparent 70%);position:relative;margin:0 auto;animation:breathe 4s ease-in-out infinite}
#orb::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(200,170,120,.2) 0%,transparent 60%);animation:pulse 3s ease-in-out infinite}
#orb::after{content:'';position:absolute;top:-30px;left:-30px;right:-30px;bottom:-30px;border-radius:50%;border:1px solid rgba(200,170,120,.06);animation:halo 5s linear infinite}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.08);opacity:1}}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}50%{transform:translate(-50%,-50%) scale(1.3);opacity:.8}}
@keyframes halo{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* ===== LAYOUT ===== */
#app{position:relative;z-index:1}
.page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px}
.sect-title{font-size:14px;letter-spacing:6px;color:var(--text-dim);margin-bottom:32px;text-align:center}

/* ===== INITIAL ===== */
#initial-state #orb{margin-bottom:40px}
#daily-quote{text-align:center;margin-bottom:28px;max-width:460px}
#daily-quote .qt-zh{font-size:15px;color:rgba(210,190,160,.5);font-style:italic;line-height:1.8}
#daily-quote .qt-orig{font-size:11px;color:rgba(210,190,160,.28);font-style:italic;line-height:1.6;margin-top:4px}
#daily-quote .qt-auth{font-size:12px;color:rgba(210,190,160,.3);margin-top:8px}
#input-wrap{position:relative;width:420px;max-width:90vw}
.input-row{display:flex;gap:10px;align-items:center}
#confusion-input{flex:1;padding:18px 24px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;font-family:var(--font);outline:none;transition:all .4s}
#confusion-input:focus{border-color:var(--border-focus);background:rgba(255,255,255,.08);box-shadow:0 0 40px var(--gold-glow)}
#confusion-input::placeholder{color:var(--text-hint);font-style:italic}
.submit-btn{
  width:48px;height:48px;border-radius:12px;flex-shrink:0;
  background:rgba(210,185,140,.08);border:1px solid rgba(210,185,140,.2);
  color:var(--gold-dim);font-size:20px;font-family:var(--font);
  cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;
}
.submit-btn:hover{background:rgba(210,185,140,.15);border-color:rgba(210,185,140,.4);color:var(--gold)}
#input-hint{margin-top:14px;font-size:12px;color:var(--text-hint);text-align:center}

/* ===== LOADING ===== */
#loading-orb{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,rgba(200,170,120,.15) 0%,transparent 70%);animation:loadBreathe 1.5s ease-in-out infinite;margin-bottom:32px}
@keyframes loadBreathe{0%,100%{transform:scale(.8);opacity:.3}50%{transform:scale(1.3);opacity:.8}}
#loading-text{font-size:13px;color:var(--text-dim);animation:loadPulse 2s ease-in-out infinite}
@keyframes loadPulse{0%,100%{opacity:.3}50%{opacity:.7}}

/* ===== RESPONSE CARD ===== */
#response-card{max-width:560px;width:100%}
.rsp-thinker{text-align:center;margin-bottom:28px}
.rsp-thinker .rsp-name{font-size:20px;color:var(--gold-dim);letter-spacing:2px}
.rsp-thinker .rsp-meta{font-size:11px;color:var(--text-dim);margin-top:4px}
.rsp-quote{text-align:center;padding:24px 0;margin-bottom:28px;border-top:1px solid rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.05)}
.rsp-quote .qt-zh{font-size:17px;font-style:italic;line-height:1.8;color:var(--text);margin-bottom:6px}
.rsp-quote .qt-orig{font-size:13px;font-style:italic;line-height:1.6;color:rgba(200,180,150,.22)}
.rsp-section{margin-bottom:24px}
.rsp-section h3{font-size:12px;letter-spacing:4px;color:var(--gold-dim);margin-bottom:10px;font-weight:normal}
.rsp-section p{font-size:14px;line-height:1.9;color:#b0a898}
.action-row{display:flex;gap:16px;justify-content:center;margin-top:36px;flex-wrap:wrap}
.btn{
  padding:10px 28px;background:transparent;border:1px solid var(--border);
  border-radius:20px;color:var(--text-dim);font-family:var(--font);font-size:13px;
  cursor:pointer;transition:all .3s;
}
.btn:hover{border-color:rgba(200,170,120,.3);color:var(--gold-dim)}
.btn-primary{background:rgba(200,170,120,.08);border-color:rgba(200,170,120,.2);color:var(--gold-dim)}
.btn-primary:hover{background:rgba(200,170,120,.15);border-color:rgba(200,170,120,.4);color:var(--gold)}
.btn-mini{padding:8px 18px;font-size:12px}

/* ===== CHAT ===== */
#chat-state{flex-direction:column;align-items:stretch;min-height:100vh;padding:0}
.chat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.05);
  position:sticky;top:0;z-index:10;background:rgba(5,5,8,.92);
  backdrop-filter:blur(10px);
}
.chat-header .ch-name{font-size:15px;color:var(--gold-dim);letter-spacing:2px}
.chat-header .ch-back{font-size:12px;color:var(--text-dim);cursor:pointer;background:none;border:none;font-family:var(--font);transition:color .3s}
.chat-header .ch-back:hover{color:var(--gold)}
.chat-body{flex:1;overflow-y:auto;padding:20px 16px 100px;display:flex;flex-direction:column;gap:16px;max-width:640px;width:100%;margin:0 auto}
.chat-bubble{max-width:82%;padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.7;animation:fadeIn .3s ease-out}
.chat-bubble.thinker{align-self:flex-start;background:rgba(210,185,140,.1);border:1px solid rgba(210,185,140,.15);border-bottom-left-radius:4px;color:#d8d0c0}
.chat-bubble.user{align-self:flex-end;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-bottom-right-radius:4px;color:#c0c0c0}
.chat-input-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:640px;padding:12px 16px 20px;
  background:linear-gradient(0deg,rgba(5,5,8,.95) 60%,transparent 100%);
  display:flex;gap:10px;z-index:10;
}
.chat-input-bar input{
  flex:1;padding:14px 18px;background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:24px;color:var(--text);
  font-size:14px;font-family:var(--font);outline:none;transition:all .3s;
}
.chat-input-bar input:focus{border-color:var(--border-focus);background:rgba(255,255,255,.06)}
.chat-input-bar input::placeholder{color:var(--text-hint)}
.chat-input-bar button{
  padding:10px 20px;background:rgba(200,170,120,.08);border:1px solid rgba(200,170,120,.15);
  border-radius:24px;color:var(--gold-dim);font-family:var(--font);font-size:13px;
  cursor:pointer;transition:all .3s;white-space:nowrap;
}
.chat-input-bar button:hover{background:rgba(200,170,120,.15);color:var(--gold)}
.chat-typing{align-self:flex-start;padding:12px 18px;color:var(--text-dim);font-size:13px;font-style:italic}
.chat-token{align-self:flex-end;font-size:10px;color:rgba(255,255,255,.18);padding:4px 8px;margin-top:4px}

/* ===== LOGIN ===== */
#login-content{text-align:center;max-width:340px;width:100%}
#login-orb{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 40% 35%,var(--gold-subtle) 0%,transparent 70%);margin:0 auto 28px;animation:breathe 4s ease-in-out infinite}
#login-content h3{font-size:16px;color:var(--text);font-weight:normal;margin-bottom:20px}
#login-content input{width:100%;padding:14px 18px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:all .3s;margin-bottom:12px}
#login-content input:focus{border-color:var(--border-focus);background:rgba(255,255,255,.08)}
#login-content input::placeholder{color:var(--text-hint)}
#login-buttons{display:flex;gap:10px;margin-top:8px}
#login-buttons .btn{flex:1}

/* ===== HISTORY ===== */
#history-btn{position:fixed;top:16px;right:24px;z-index:10;font-size:12px;color:var(--text-dim);cursor:pointer;background:none;border:none;font-family:var(--font);transition:color .3s}
#history-btn:hover{color:var(--gold-dim)}
#music-btn{position:fixed;top:16px;left:24px;z-index:10;font-size:13px;color:var(--text-dim);cursor:pointer;background:none;border:none;font-family:var(--font);transition:all .3s}
#music-btn:hover{color:var(--gold-dim)}
#music-btn.on{color:rgba(210,185,140,.45)}
#history-panel{position:fixed;top:0;right:0;bottom:0;width:100%;max-width:380px;background:rgba(8,8,16,.96);backdrop-filter:blur(20px);z-index:50;border-left:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease-out}
#history-panel.open{transform:translateX(0)}
#history-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49;display:none}
#history-overlay.show{display:block}
.history-header{padding:20px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center}
.history-header h3{font-size:14px;color:var(--gold-dim);font-weight:normal;letter-spacing:2px}
.history-header button{font-size:20px;color:var(--text-dim);cursor:pointer;background:none;border:none;font-family:var(--font)}
.history-list{flex:1;overflow-y:auto;padding:16px}
.history-item{padding:16px;margin-bottom:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:10px;cursor:pointer;transition:all .3s}
.history-item:hover{background:rgba(255,255,255,.06);border-color:rgba(210,185,140,.15)}
.history-item .hi-date{font-size:10px;color:var(--text-hint);margin-bottom:6px}
.history-item .hi-confusion{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.history-item .hi-thinker{font-size:11px;color:var(--gold-dim)}
.history-empty{text-align:center;padding:40px 20px;color:var(--text-hint);font-size:13px}

/* ===== KEY SETUP ===== */
#key-setup-content{text-align:center;max-width:360px;padding:40px}
#key-setup-content h2{font-size:18px;color:var(--text);font-weight:normal;margin-bottom:12px}
#key-setup-content p{font-size:12px;color:var(--text-dim);margin-bottom:24px;line-height:1.6}
#key-setup-content a{color:var(--gold-dim)}
#api-key-input{width:100%;padding:14px 18px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:all .3s;margin-bottom:16px}
#api-key-input:focus{border-color:var(--border-focus);box-shadow:0 0 30px var(--gold-glow)}
#save-key{padding:10px 32px;background:rgba(200,170,120,.08);border:1px solid rgba(200,170,120,.2);border-radius:8px;color:var(--gold-dim);font-family:var(--font);font-size:14px;cursor:pointer;transition:all .3s}
#save-key:hover{background:rgba(200,170,120,.15);border-color:rgba(200,170,120,.4);color:var(--gold)}

/* ===== FOOTER ===== */
footer{position:fixed;bottom:16px;right:24px;z-index:10;display:flex;gap:20px;align-items:center}
footer a{font-size:11px;color:rgba(255,255,255,.22);text-decoration:none;transition:color .3s}
footer a:hover{color:rgba(255,255,255,.4)}

/* ===== ERROR ===== */
.error-state{text-align:center;color:var(--text-dim);padding:40px}
.error-state p{margin-bottom:16px}
.error-state button{padding:8px 24px;background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--text-dim);font-family:var(--font);cursor:pointer}
.error-state button:hover{border-color:var(--gold-dim);color:var(--gold-dim)}

/* ===== PARTICLE ===== */
.particle{position:fixed;border-radius:50%;pointer-events:none;z-index:0;animation:floatUp 6s ease-in infinite}
@keyframes floatUp{0%{transform:translateY(0) scale(0);opacity:0}20%{opacity:.6}80%{opacity:.1}100%{transform:translateY(-60vh) scale(1.5);opacity:0}}

@media(max-width:600px){
  #orb{width:120px;height:120px}
  #orb::before{width:50px;height:50px}
  #orb::after{top:-18px;left:-18px;right:-18px;bottom:-18px}
  .sect-title{font-size:11px;letter-spacing:4px}
  #daily-quote .qt-zh{font-size:14px}
  #daily-quote .qt-orig{font-size:10px}
  #confusion-input{font-size:16px;padding:16px 18px}
  .rsp-quote .qt-zh{font-size:16px}
  .rsp-quote .qt-orig{font-size:12px}
  .submit-btn{width:44px;height:44px;border-radius:10px;font-size:18px}
  .input-row{gap:8px}
  .chat-bubble{max-width:92%}
  .chat-bubble.thinker{font-size:14px;padding:12px 15px}
  .chat-bubble.user{font-size:14px;padding:12px 15px}
  .chat-header{padding:12px 16px}
  .chat-header .ch-name{font-size:14px}
  .chat-input-bar{
    padding:10px 12px max(20px,env(safe-area-inset-bottom));
  }
  .chat-input-bar input{font-size:16px;padding:12px 16px}
  .chat-body{padding:16px 12px 120px}
  .rsp-section p{font-size:14px}
  .btn{font-size:12px;padding:10px 22px}
  #response-card{padding:0 8px}
  footer{bottom:max(12px,env(safe-area-inset-bottom))}
}
</style>
</head>
<body>

<div id="particles"></div>

<!-- ===== LOGIN ===== -->
<div id="login-screen" class="page">
  <div id="login-content">
    <div id="login-orb"></div>
    <div class="sect-title">太 阳 底 下 无 新 事</div>
    <h3 id="login-title">登录</h3>
    <input id="login-username" type="text" placeholder="用户名" autofocus>
    <input id="login-password" type="password" placeholder="密码">
    <div id="login-buttons">
      <button id="login-btn" class="btn btn-primary">登录</button>
      <button id="register-btn" class="btn">注册</button>
    </div>
    <p id="login-msg" style="font-size:11px;color:#c06050;margin-top:12px;display:none"></p>
    <p style="font-size:10px;color:var(--text-hint);margin-top:16px">数据仅存储在本机浏览器中，不会上传</p>
  </div>
</div>

<div id="app" class="hidden">

  <!-- ===== INITIAL ===== -->
  <div id="initial-state" class="page">
    <div id="orb"></div>
    <div class="sect-title">太 阳 底 下 无 新 事</div>
    <button id="music-btn" onclick="toggleMusic()" title="环境音景">♪</button>
    <button id="history-btn" onclick="openHistory()">历史记录</button>
    <div id="daily-quote"></div>
    <div id="input-wrap">
      <div class="input-row">
        <input id="confusion-input" type="text" placeholder="输入你的困惑..." autofocus>
        <button id="submit-btn" class="submit-btn">→</button>
      </div>
      <div id="input-hint">按下回车或点击箭头</div>
    </div>
  </div>

  <!-- ===== LOADING ===== -->
  <div id="loading-state" class="page hidden">
    <div id="loading-orb"></div>
    <p id="loading-text">正在聆听你的困惑...</p>
  </div>

  <!-- ===== RESPONSE ===== -->
  <div id="response-state" class="page hidden">
    <div id="response-card"></div>
    <div class="action-row">
      <button id="continue-chat" class="btn btn-primary">继续对话 · 深入探讨</button>
      <button id="switch-thinker" class="btn">换一位思想家</button>
    </div>
    <span class="token-spot" style="font-size:10px;color:rgba(255,255,255,.18);margin-top:16px"></span>
    <button id="back-btn" class="btn btn-mini" style="margin-top:12px">回到星云</button>
  </div>

  <!-- ===== CHAT ===== -->
  <div id="chat-state" class="page hidden">
    <div class="chat-header">
      <span class="ch-name"></span>
      <button class="ch-back" id="chat-back">← 返回星云</button>
    </div>
    <div class="chat-body" id="chat-body">
      <div id="chat-token" class="chat-token"></div>
    </div>
    <div class="chat-input-bar">
      <input id="chat-input" type="text" placeholder="继续追问...">
      <button id="chat-send">发送</button>
    </div>
  </div>

  <!-- ===== HISTORY PANEL ===== -->
  <div id="history-overlay" onclick="closeHistory()"></div>
  <div id="history-panel">
    <div class="history-header">
      <h3>思想记录</h3>
      <button onclick="closeHistory()">×</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

  <!-- ===== KEY SETUP ===== -->
  <div id="key-setup" class="page hidden">
    <div id="key-setup-content">
      <h2>设置 DeepSeek API Key</h2>
      <p>你的 Key 仅存储在本地浏览器中，只会发送到 api.deepseek.com。<br>前往 <a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a> 获取。</p>
      <input id="api-key-input" type="password" placeholder="sk-...">
      <button id="save-key">保存</button>
      <button id="clear-key" style="margin-top:8px;padding:6px 16px;background:transparent;border:none;color:rgba(255,255,255,.12);font-family:var(--font);font-size:11px;cursor:pointer">清除 Key</button>
      <p id="key-error" style="color:#c06050;font-size:12px;margin-top:12px;display:none"></p>
    </div>
  </div>

</div>

<footer>
  <a href="#" id="key-indicator" class="key-indicator" onclick="event.preventDefault();showKeySetup()">⚡ Key 未设置</a>
</footer>

<script>
/* 哲学家语录数据库 — 2026-06-25 */
const PHILOSOPHERS = {"nietzsche":{"name":"尼采","nameEn":"Friedrich Nietzsche","school":"存在主义","era":"1844-1900","originalLang":"de","core":"权力意志、超人哲学、上帝已死、永恒轮回","style":"炽热、诗意、颠覆。用锤子进行哲学思考，重估一切价值。","quotes":[{"content":"It is not a lack of love, but a lack of friendship that makes unhappy marriages.","original":"It is not a lack of love, but a lack of friendship that makes unhappy marriages.","originalLang":"en","tags":["Friendship"]},{"content":"There is more wisdom in your body than in your deepest philosophy.","original":"There is more wisdom in your body than in your deepest philosophy.","originalLang":"en","tags":["Wisdom"]},{"content":"Does wisdom perhaps appear on the earth as a raven which is inspired by the smell of carrion?","original":"Does wisdom perhaps appear on the earth as a raven which is inspired by the smell of carrion?","originalLang":"en","tags":["Wisdom"]},{"content":"The man of knowledge must be able not only to love his enemies but also to hate his friends.","original":"The man of knowledge must be able not only to love his enemies but also to hate his friends.","originalLang":"en","tags":["Wisdom"]},{"content":"We love life, not because we are used to living but because we are used to loving.","original":"We love life, not because we are used to living but because we are used to loving.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Love is blind; friendship closes its eyes.","original":"Love is blind; friendship closes its eyes.","originalLang":"en","tags":["Friendship"]},{"content":"You need chaos in your soul to give birth to a dancing star.","original":"You need chaos in your soul to give birth to a dancing star.","originalLang":"en","tags":["Famous Quotes"]},{"content":"Rejoicing in our joy, not suffering over our suffering, makes someone a friend.","original":"Rejoicing in our joy, not suffering over our suffering, makes someone a friend.","originalLang":"en","tags":["Friendship"]},{"content":"上帝已死。而我们杀死了他。我们——所有谋杀者中最伟大的谋杀者 arer we should see through it.","originalLang":"en","tags":["Wisdom"]},{"content":"人注定是自由的。人就是自由。","original":"L'homme est condamné à être libre.","tags":["自由","责任"],"originalLang":"fr"},{"content":"他者即地狱——但这不意味着他人让我们受苦，而是他人的目光让我们无法成为自己。","original":"L'enfer, c'est les autres.","tags":["他人","存在"],"originalLang":"fr"},{"content":"存在先于本质——你先存在，然后才通过自己的选择定义自己。","original":"L'existence précède l'essence.","tags":["存在","选择"],"originalLang":"fr"},{"content":"人是自己选择的总和。","original":"L'homme est la somme de ses choix.","tags":["选择","自我"],"originalLang":"fr"},{"content":"我们是我们所不是的，而不是我们所是的。","original":"Nous sommes ce que nous ne sommes pas, et nous ne sommes pas ce que nous sommes.","tags":["存在","虚无"],"originalLang":"fr"}]},"camus":{"name":"加缪","nameEn":"Albert Camus","school":"存在主义","era":"1913-1960","originalLang":"fr","core":"荒谬、西西弗神话、反抗、局外人","style":"清醒而温柔。承认荒谬但不屈服，在无意义中创造意义。","quotes":[{"content":"In the depth of winter, I finally learned that there was within me an invincible summer.","original":"In the depth of winter, I finally learned that there was within me an invincible summer.","originalLang":"en","tags":["Famous Quotes","Inspirational"]},{"content":"All men have a sweetness in their life. That is what helps them go on. It is towards that they turn when they feel too worn out.","original":"All men have a sweetness in their life. That is what helps them go on. It is towards that they turn when they feel too worn out.","originalLang":"en","tags":["Famous Quotes"]},{"content":"You will never be happy if you continue to search for what happiness consists of. You will never live if you are looking for the meaning of life.","original":"You will never be happy if you continue to search for what happiness consists of. You will never live if you are looking for the meaning of life.","originalLang":"en","tags":["Famous Quotes","Life","Happiness"]},{"content":"Autumn is a second spring when every leaf is a flower.","original":"Autumn is a second spring when every leaf is digkeit.","tags":["自由","必然"],"originalLang":"de"},{"content":"凡是存在的，必在它的概念中消逝；凡是发展的，必包含它的否定在其中。","original":"Die Knospe verschwindet in dem Hervorbrechen der Blüte.","tags":["辩证","否定"],"originalLang":"de"},{"content":"量的变化积累到一定程度，必然引起质的飞跃。","original":"Das Umschlagen von Quantität in Qualität — ein Sprung aus quantitativer Veränderung in qualitative.","tags":["量变质变","辩证"],"originalLang":"de"},{"content":"人的欲望在于被另一个欲望所承认。人是为承认而斗争的存在。","original":"Das Selbstbewußtsein ist an und für sich, indem und dadurch, dass es für ein anderes an und für sich ist.","tags":["承认","欲望"],"originalLang":"de"},{"content":"世界历史就是自由意识的进步史。","original":"Die Weltgeschichte ist der Fortschritt im Bewußtsein der Freiheit.","tags":["历史","自由"],"originalLang":"de"},{"content":"凡是现实的都是合理的——但现实不等于现存。只有符合理性必然性的现存才是现实的。","original":"Was wirklich ist, das ist vernünftig. Nicht alles, was existiert, ist wirklich.","tags":["理性","现实"],"originalLang":"de"}]},"marx":{"name":"马克思","nameEn":"Karl Marx","school":"辩证/历史","era":"1818-1883","originalLang":"de","core":"异化劳动、阶级斗争、历史唯物主义、资本批判","style":"批判性极强。揭露表象下的物质关系，哲学必须改变世界。","quotes":[{"content":"哲学家们只是用不同的方式解释世界，而问题在于改变世界。","original":"Die Philosophen haben die Welt nur verschieden interpretiert; es kömmt darauf an, sie zu verändern.","tags":["实践","改变"],"originalLang":"de"},{"content":"到目前为止的一切社会的历史都是阶级斗争的历史。","original":"Die Geschichte aller bisherigen Gesellschaft ist die Geschichte von Klassenkämpfen.","tags":["阶级","历史"],"originalLang":"de"},{"content":"不是人们的意识决定人们的存在，相反，是人们的社会存在决定人们的意识。","original":"Es ist nicht das Bewußtsein der Menschen, das ihr Sein, sondern umgekehrt ihr gesellschaftliches Sein, das ihr Bewußtsein bestimmt.","tags":["存在","意识"],"originalLang":"de"},{"content":"宗教是人民的鸦片。","original":"Die Religion ist das Opium des Volkes.","tags":["宗教","异化"],"originalLang":"de"},{"content":"每个人的自由发展是一切人自由发展的条件。","original":"Die freie Entwicklung eines Jeden ist die Bedingung für die freie Entwicklung Aller.","tags":["自由","社会"],"originalLang":"de"},{"c
